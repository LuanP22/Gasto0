<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gasto0 — Controle Financeiro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A0A0F;--bg2:#16161F;--bg3:#1E1E2A;--bg4:#252535;--txt:#F0F0F8;--txt2:#8888A8;--acc:#7B61FF;--acc2:#9B85FF;--grn:#00E5A0;--red:#FF4B6B;--ylw:#FFB830;--blu:#4B8BFF;--brd:rgba(255,255,255,0.08);--brd2:rgba(255,255,255,0.15);--rad:12px}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:13px}
input,select,button,textarea{font-family:inherit;font-size:13px}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
#root{height:100vh;display:flex;flex-direction:column}

/* AUTH */
#auth-screen{flex:1;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(123,97,255,.13) 0%,transparent 70%),var(--bg);padding:16px}
.auth-box{width:100%;max-width:360px;background:var(--bg2);border:1px solid var(--brd2);border-radius:18px;padding:32px 28px;margin:0 auto}
.logo{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--acc2),var(--grn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;text-align:center}
.logo-sub{color:var(--txt2);font-size:.78rem;text-align:center;margin-top:3px;margin-bottom:24px}
.tabs{display:flex;background:var(--bg3);border-radius:8px;padding:2px;gap:2px;margin-bottom:18px}
.tab{flex:1;padding:7px;border:none;background:transparent;color:var(--txt2);font-size:.78rem;font-weight:600;border-radius:6px;cursor:pointer;transition:all .15s}
.tab.on{background:var(--bg4);color:var(--txt)}
.fl{margin-bottom:11px}
.fl label{display:block;font-size:.68rem;font-weight:600;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.inp{width:100%;background:var(--bg3);border:1px solid var(--brd);color:var(--txt);border-radius:7px;padding:9px 11px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(123,97,255,.15)}
.inp::placeholder{color:var(--txt2);opacity:.5}
.inp option{background:var(--bg2)}
.btn-main{width:100%;padding:11px;background:linear-gradient(135deg,var(--acc),#5B41CF);color:#fff;border:none;border-radius:7px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:4px}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 7px 20px rgba(123,97,255,.4)}
.err{background:rgba(255,75,107,.1);border:1px solid rgba(255,75,107,.25);color:var(--red);border-radius:6px;padding:8px 11px;font-size:.78rem;margin-bottom:11px;text-align:center}
.demo-hint{text-align:center;font-size:.68rem;color:var(--txt2);margin-top:8px;opacity:.7}

/* APP LAYOUT */
#app-screen{flex:1;display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100%;overflow:hidden}
.sidebar{width:180px;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;padding:14px 10px;flex-shrink:0;overflow-y:auto}
.sb-logo{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--acc2),var(--grn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;padding:0 6px;margin-bottom:4px}
.sb-plan{display:inline-block;font-size:.58rem;font-weight:700;padding:1px 6px;background:rgba(123,97,255,.2);color:var(--acc2);border-radius:20px;text-transform:uppercase;margin:0 0 18px 6px}
.sb-sec{font-size:.58rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;padding:0 6px;margin:12px 0 5px}
.nav{display:flex;align-items:center;gap:7px;padding:8px 6px;border-radius:7px;cursor:pointer;color:var(--txt2);font-size:.82rem;margin-bottom:1px;transition:all .12s;user-select:none}
.nav:hover{background:var(--bg3);color:var(--txt)}
.nav.on{background:rgba(123,97,255,.15);color:var(--acc2);font-weight:600}
.nav-ic{width:16px;text-align:center;font-size:.85rem;flex-shrink:0}
.nav-label{font-size:.82rem}
.nav-badge{margin-left:auto;font-size:.58rem;background:rgba(255,75,107,.2);color:var(--red);padding:1px 5px;border-radius:8px;font-weight:700}
.sb-foot{border-top:1px solid var(--brd);padding:10px 6px 0;margin-top:auto;display:flex;align-items:center;gap:7px}
.av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--grn));display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0}
.un{flex:1;min-width:0}
.un-name{font-size:.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.un-email{font-size:.62rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-logout{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:.85rem;padding:3px;border-radius:4px;transition:color .12s}
.btn-logout:hover{color:var(--red)}
.main{flex:1;overflow-y:auto;padding:20px 22px;position:relative;box-sizing:border-box}
.ph{margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px}
.ph h1{font-size:1.3rem;font-weight:800;letter-spacing:-.5px;color:var(--txt)}
.ph .sub{color:var(--txt2);font-size:.78rem;margin-top:2px}
.btn-add{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:linear-gradient(135deg,var(--acc),#5B41CF);color:#fff;border:none;border-radius:7px;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(123,97,255,.4)}
.btn-s{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:var(--bg3);border:1px solid var(--brd);color:var(--txt2);border-radius:6px;font-size:.74rem;cursor:pointer;transition:all .12s}
.btn-s:hover{color:var(--txt);border-color:var(--brd2)}
.btn-g{background:rgba(0,229,160,.1);border-color:rgba(0,229,160,.25);color:var(--grn)}
.btn-d{background:rgba(255,75,107,.1);border-color:rgba(255,75,107,.25);color:var(--red)}

/* CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.sc{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);padding:13px 15px;position:relative;overflow:hidden;transition:transform .15s,border-color .15s}
.sc:hover{transform:translateY(-2px);border-color:var(--brd2)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0}
.cp::before{background:linear-gradient(90deg,var(--acc),var(--acc2))}.cg::before{background:var(--grn)}.cr::before{background:var(--red)}.cy::before{background:var(--ylw)}.cb::before{background:var(--blu)}
.sc-lbl{font-size:.65rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.sc-val{font-size:1.2rem;font-weight:800;letter-spacing:-.5px;margin-bottom:3px}
.sc-sub{font-size:.66rem;color:var(--txt2)}
.vg{color:var(--grn)}.vr{color:var(--red)}.vy{color:var(--ylw)}.vb{color:var(--blu)}.va{color:var(--acc2)}.vt{color:var(--txt)}
.panel{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);padding:15px;margin-bottom:13px}
.pt{font-size:.85rem;font-weight:700;color:var(--txt);margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.two{display:grid;grid-template-columns:1fr 240px;gap:12px;margin-bottom:13px}

/* TRANSACTIONS */
.frow{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.fsearch{flex:1;min-width:100px;background:var(--bg2);border:1px solid var(--brd);color:var(--txt);border-radius:6px;padding:7px 10px;outline:none}
.fsearch:focus{border-color:var(--acc)}
.fsearch::placeholder{color:var(--txt2);opacity:.5}
.fsel{background:var(--bg2);border:1px solid var(--brd);color:var(--txt);border-radius:6px;padding:7px 10px;outline:none;cursor:pointer}
.fsel option{background:var(--bg2)}
.ttable{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);overflow:hidden}
.thead{display:grid;grid-template-columns:1fr 90px 75px 82px 86px 50px;gap:6px;padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--brd)}
.th{font-size:.63rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px}
.trow{display:grid;grid-template-columns:1fr 90px 75px 82px 86px 50px;gap:6px;padding:10px 14px;border-bottom:1px solid var(--brd);align-items:center;transition:background .12s}
.trow:last-child{border-bottom:none}
.trow:hover{background:var(--bg3)}
.td-d{font-size:.82rem;color:var(--txt)}
.td-c{font-size:.72rem;color:var(--txt2)}
.td-dt{font-size:.74rem;color:var(--txt2)}
.td-v{font-size:.86rem;font-weight:700}
.td-v.income{color:var(--grn)}.td-v.expense{color:var(--red)}
.td-acts{display:flex;gap:3px}
.act-btn{background:none;border:none;color:transparent;cursor:pointer;padding:3px 5px;border-radius:5px;font-size:.78rem;transition:all .12s}
.trow:hover .act-btn{color:var(--txt2)}
.act-btn.edit:hover{background:rgba(123,97,255,.15);color:var(--acc2)!important}
.act-btn.del:hover{background:rgba(255,75,107,.15);color:var(--red)!important}
.empty{text-align:center;padding:36px 20px;color:var(--txt2)}
.empty-ic{font-size:2.2rem;margin-bottom:8px}
.empty-t{font-size:.9rem;color:var(--txt);margin-bottom:3px;font-weight:600}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:var(--bg2);border:1px solid var(--brd2);border-radius:16px;width:100%;max-width:420px;padding:22px;max-height:90vh;overflow-y:auto}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mh h2{font-size:1rem;font-weight:800;color:var(--txt)}
.mclose{background:var(--bg3);border:none;color:var(--txt2);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:.85rem;transition:all .12s}
.mclose:hover{background:rgba(255,75,107,.15);color:var(--red)}
.ttog{display:flex;background:var(--bg3);border-radius:8px;padding:2px;gap:2px;margin-bottom:13px}
.tbtn{flex:1;padding:8px;border:none;background:transparent;color:var(--txt2);font-size:.78rem;font-weight:600;border-radius:6px;cursor:pointer;transition:all .15s}
.tbtn.income.on{background:rgba(0,229,160,.15);color:var(--grn)}
.tbtn.expense.on{background:rgba(255,75,107,.15);color:var(--red)}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.macts{display:flex;gap:8px;margin-top:15px}
.btn-cancel{flex:1;padding:10px;background:var(--bg3);border:1px solid var(--brd);color:var(--txt2);border-radius:7px;cursor:pointer;transition:all .12s}
.btn-cancel:hover{color:var(--txt)}
.btn-save{flex:2;padding:10px;background:linear-gradient(135deg,var(--acc),#5B41CF);color:#fff;border:none;border-radius:7px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-save:hover{transform:translateY(-1px)}

/* CHARTS */
.bars{width:100%;overflow:hidden}
.bl{font-size:.58rem;color:var(--txt2)}
.bleg{display:flex;gap:12px;margin-top:6px;justify-content:flex-end}
.bli{display:flex;align-items:center;gap:4px;font-size:.65rem;color:var(--txt2)}
.bld{width:6px;height:6px;border-radius:50%}

/* CAT LIST */
.catlist{display:flex;flex-direction:column;gap:8px}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.cname{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--txt)}
.cval{font-size:.74rem;color:var(--txt2)}
.cbg{background:var(--bg3);border-radius:3px;height:4px;overflow:hidden}
.cfill{height:100%;border-radius:3px}

/* INSIGHTS */
.icard{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:9px;border:1px solid transparent;margin-bottom:7px}
.icard.danger{background:rgba(255,75,107,.07);border-color:rgba(255,75,107,.2)}
.icard.warning{background:rgba(255,184,48,.07);border-color:rgba(255,184,48,.2)}
.icard.success{background:rgba(0,229,160,.07);border-color:rgba(0,229,160,.2)}
.icard.info{background:rgba(75,139,255,.07);border-color:rgba(75,139,255,.2)}
.iic{font-size:1rem;flex-shrink:0;margin-top:1px}
.it{font-size:.8rem;font-weight:600;color:var(--txt);margin-bottom:2px}
.im{font-size:.73rem;color:var(--txt2);line-height:1.4}

/* CREDIT CARDS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:14px}
.ccard{border-radius:11px;padding:15px 17px;color:#fff;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s;min-height:96px;margin-bottom:8px}
.ccard:hover{transform:scale(1.02)}
.cc-chip{width:24px;height:18px;background:rgba(255,255,255,.25);border-radius:3px;margin-bottom:10px;font-size:.58rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.cc-name{font-size:.92rem;font-weight:700;margin-bottom:2px}
.cc-info{font-size:.6rem;opacity:.8}
.cc-lim{position:absolute;top:12px;right:13px;text-align:right}
.cc-lim-l{font-size:.56rem;opacity:.7;text-transform:uppercase}
.cc-lim-v{font-size:.82rem;font-weight:700}
.cc-due{position:absolute;bottom:12px;right:13px;text-align:right;font-size:.6rem;opacity:.8}
.invp{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-top:8px}
.invrow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--brd);font-size:.74rem}
.invrow:last-child{border-bottom:none;font-weight:700;font-size:.78rem}
.invlbl{color:var(--txt2)}
.hpill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:.63rem;font-weight:700}
.hps{background:rgba(0,229,160,.15);color:var(--grn)}.hpw{background:rgba(255,184,48,.15);color:var(--ylw)}.hpd{background:rgba(255,75,107,.15);color:var(--red)}

/* GOALS */
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px}
.gcard{background:var(--bg3);border:1px solid var(--brd);border-radius:11px;padding:13px 14px;transition:border-color .15s;min-width:0}
.gcard:hover{border-color:var(--brd2)}
.gh{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.gi{font-size:1.2rem;flex-shrink:0}
.gn{font-size:.84rem;font-weight:700;color:var(--txt);word-break:break-word}
.gdl{font-size:.63rem;color:var(--txt2);margin-top:2px}
.gpbg{background:var(--bg4);border-radius:5px;height:6px;overflow:hidden;margin-bottom:8px}
.gpfill{height:100%;border-radius:5px}
/* FIX: goal stats 3 cols sem overflow */
.gstats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;margin-bottom:8px}
.gsi{background:var(--bg4);border-radius:6px;padding:6px 5px;text-align:center;min-width:0;overflow:hidden}
.gsl{font-size:.58rem;color:var(--txt2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gsv{font-size:.72rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.gacts{display:flex;gap:4px}

/* BILLS */
.bcard{display:flex;align-items:center;gap:9px;background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:10px 12px;margin-bottom:7px;transition:border-color .15s}
.bcard:hover{border-color:var(--brd2)}
.bic{font-size:1.05rem;width:28px;height:28px;background:var(--bg4);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bi2{flex:1;min-width:0}
.bn{font-size:.8rem;font-weight:600;color:var(--txt)}
.bm{font-size:.67rem;color:var(--txt2);margin-top:1px}
.bv{font-size:.82rem;font-weight:700;white-space:nowrap;margin-right:6px}
.tog{width:32px;height:18px;border-radius:9px;border:none;cursor:pointer;position:relative;transition:background .15s;flex-shrink:0}
.tog.on{background:var(--grn)}.tog.off{background:var(--bg4);border:1px solid var(--brd2)}
.tog::after{content:'';position:absolute;top:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .15s}
.tog.on::after{left:17px}.tog.off::after{left:2px}

/* REPORTS */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.rpanel{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);padding:13px}
.rpanel.full{grid-column:1/-1}
.mnav{display:flex;align-items:center;gap:8px}
.mb{background:var(--bg3);border:1px solid var(--brd);color:var(--txt2);width:26px;height:26px;border-radius:6px;font-size:.9rem;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;justify-content:center}
.mb:hover{background:var(--bg4);color:var(--txt)}
.ml{font-size:.84rem;font-weight:700;min-width:116px;text-align:center;color:var(--txt)}
.ri{display:flex;align-items:center;gap:8px;padding:7px 9px;background:var(--bg3);border-radius:7px;margin-bottom:5px}
.rpos{font-size:.65rem;font-weight:800;color:var(--txt2);width:13px}
.rinf{flex:1;min-width:0}
.rn{font-size:.76rem;font-weight:500;color:var(--txt)}
.rbg{background:var(--bg4);border-radius:2px;height:3px;overflow:hidden;margin-top:3px}
.rfill{height:100%;border-radius:2px}
.rv{font-size:.74rem;font-weight:700;white-space:nowrap}
.sbar{height:20px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:10px}
.hi{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;border:1px solid transparent;cursor:pointer;margin-bottom:3px;transition:background .12s}
.hi:hover{background:var(--bg3)}.hi.worst{border-color:rgba(255,75,107,.25);background:rgba(255,75,107,.05)}.hi.best{border-color:rgba(0,229,160,.25);background:rgba(0,229,160,.05)}.hi.sel{border-color:rgba(123,97,255,.3);background:rgba(123,97,255,.08)}
.hm{font-size:.73rem;font-weight:600;color:var(--txt2);min-width:55px}
.hb{display:block;font-size:.57rem;margin-top:1px}
.hbars{flex:1;display:flex;flex-direction:column;gap:2px}
.hbrow{display:flex;align-items:center;gap:4px}
.hbbg{flex:1;background:var(--bg4);border-radius:2px;height:4px;overflow:hidden}
.hbf{height:100%;border-radius:2px}
.hbv{font-size:.64rem;font-weight:600;min-width:54px;text-align:right;white-space:nowrap}
.hbal{font-size:.7rem;font-weight:700;min-width:54px;text-align:right}
.smets{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.smi{background:var(--bg3);border-radius:7px;padding:9px 10px;text-align:center}
.sml{font-size:.6rem;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.smv{font-size:.84rem;font-weight:800}
.alrt{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:8px;margin-bottom:7px}
.alrt.danger{background:rgba(255,75,107,.08);border:1px solid rgba(255,75,107,.2)}.alrt.warning{background:rgba(255,184,48,.08);border:1px solid rgba(255,184,48,.2)}.alrt.success{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2)}
.aic{font-size:.95rem;flex-shrink:0}.ab{font-size:.74rem;color:var(--txt2);line-height:1.4}.ab strong{color:var(--txt);display:block;font-size:.76rem}

/* CATS PAGE */
.ceitem{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:8px;padding:8px 11px;border:1px solid var(--brd);margin-bottom:6px}
.cedot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ICON/COLOR PICKERS */
.ipicker{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.ipk{width:28px;height:28px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:.88rem;cursor:pointer;border:1px solid var(--brd);transition:all .1s}
.ipk.on{background:var(--acc);border-color:var(--acc2)}
.cpicker{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}

<script>
// ── DATA ──────────────────────────────────────────────────────
const CATS=[{id:"food",label:"Alimentação",icon:"🍔",color:"#FF6B6B",d:1},{id:"transport",label:"Transporte",icon:"🚗",color:"#4ECDC4",d:1},{id:"housing",label:"Moradia",icon:"🏠",color:"#45B7D1",d:1},{id:"leisure",label:"Lazer",icon:"🎮",color:"#96CEB4",d:1},{id:"health",label:"Saúde",icon:"💊",color:"#FFEAA7",d:1},{id:"education",label:"Educação",icon:"📚",color:"#DDA0DD",d:1},{id:"others",label:"Outros",icon:"📦",color:"#B0C4DE",d:1}];
const MONTHS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
function curMonthKey(){const n=new Date();return n.getFullYear()+"-"+n.getMonth();}
function isBillPaidThisMonth(b){return !!(b.paidMonths&&b.paidMonths[curMonthKey()]);}
function togBillPaidMonth(id){
  const mk=curMonthKey();
  save({...D,bills:(D.bills||[]).map(b=>{
    if(b.id!==id)return b;
    const pm={...(b.paidMonths||{})};
    pm[mk]=!pm[mk];
    return{...b,paidMonths:pm};
  })});
}
const fmt=v=>new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);
const fd=s=>{if(!s)return"";const[y,m,d]=s.split("-");return`${d}/${m}/${y}`};
const tod=()=>new Date().toISOString().split("T")[0];
const LS={g:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},d:k=>{try{localStorage.removeItem(k)}catch{}}};

function emptyD(){return{transactions:[],cards:[],goals:[],categories:CATS.map(c=>({...c})),bills:[]};}

// ── Auth localStorage (primário) + API Netlify (secundário/sync) ──
function lsAuth(action,email,pw,name){
  // Sempre funciona offline via localStorage
  const users=LS.g("g0_users")||[{id:"demo",name:"João Silva",email:"joao@gasto0.com",pw:"123456"}];
  if(action==="login"){
    const found=users.find(u=>u.email===email&&u.pw===pw);
    if(!found)return{error:"Email ou senha incorretos."};
    const{pw:_,...safe}=found;return{user:safe};
  }else{
    if(!name||!email||!pw)return{error:"Preencha todos os campos."};
    if(pw.length<6)return{error:"Senha: mínimo 6 caracteres."};
    if(users.find(u=>u.email===email))return{error:"Email já cadastrado."};
    const nu={id:Date.now().toString(),name,email,pw};
    LS.s("g0_users",[...users,nu]);
    const{pw:_,...safe}=nu;return{user:safe};
  }
}
async function apiAuth(action,email,pw,name){
  // Tenta API Netlify; se falhar usa localStorage
  try{
    const r=await Promise.race([
      fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,email,password:pw,name})}),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),3000))
    ]);
    const j=await r.json();
    if(!j.error&&j.user){
      // Sincroniza com localStorage também
      const users=LS.g("g0_users")||[];
      if(!users.find(u=>u.id===j.user.id))LS.s("g0_users",[...users,{...j.user,pw}]);
    }
    return j;
  }catch(e){
    // Fallback para localStorage
    return lsAuth(action,email,pw,name);
  }
}
async function apiLoad(uid){
  try{
    const r=await Promise.race([
      fetch('/api/data-get?userId='+uid),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),3000))
    ]);
    const j=await r.json();
    if(j.data){if(!j.data.categories||!j.data.categories.length)j.data.categories=CATS.map(c=>({...c}));return j.data;}
  }catch(e){}
  // Fallback localStorage
  const d=LS.g("g0_data_"+uid);
  if(d){if(!d.categories||!d.categories.length)d.categories=CATS.map(c=>({...c}));return d;}
  return uid==="demo"?demoD():emptyD();
}
async function apiSave(uid,d){
  LS.s("g0_data_"+uid,d); // local sempre
  try{
    await fetch('/api/data-save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:uid,data:d})});
  }catch(e){}
}
function setUD(uid,d){apiSave(uid,d);}
function getUD(uid){const d=LS.g("g0_data_"+uid);if(!d)return uid==="demo"?demoD():emptyD();if(!d.categories||!d.categories.length)d.categories=CATS.map(c=>({...c}));return d;}

function demoD(){
  const txs=[];let id=1;
  const a=(t,v,c,desc,days,cid)=>{const dt=new Date();dt.setDate(dt.getDate()-days);txs.push({id:String(id++),type:t,value:v,category:c,description:desc,date:dt.toISOString().split("T")[0],cardId:cid||null});};
  a("income",5500,"others","Salário",1);a("expense",850,"housing","Aluguel",2);a("expense",420,"food","Supermercado",3);a("expense",180,"transport","Uber/Gasolina",4);a("expense",320,"food","Restaurantes",6);a("expense",145,"health","Farmácia",8);a("income",800,"others","Freelance",10);a("expense",210,"food","iFood",12);a("expense",390,"leisure","Show + Saída",14,"c1");a("expense",150,"leisure","Assinatura",5,"c1");a("expense",530,"education","Curso online",18);a("income",5500,"others","Salário",32);a("expense",850,"housing","Aluguel",33);a("expense",310,"food","Supermercado",34);a("expense",160,"transport","Gasolina",35);a("expense",240,"food","iFood",48);
  return{transactions:txs,categories:CATS.map(c=>({...c})),cards:[{id:"c1",name:"Nubank Roxinho",limit:3000,closingDay:10,dueDay:17,color:"#8A2BE2"}],goals:[{id:"g1",name:"Viagem Europa",target:15000,saved:3200,deadline:"2026-12-01",icon:"✈️",color:"#4ECDC4"},{id:"g2",name:"Reserva emergência",target:10000,saved:5500,deadline:"2026-06-01",icon:"🛡️",color:"#00E5A0"}],bills:[{id:"b1",name:"Netflix",value:45.90,category:"leisure",dueDay:15,active:true,icon:"🎬"},{id:"b2",name:"Spotify",value:21.90,category:"leisure",dueDay:15,active:true,icon:"🎵"},{id:"b3",name:"Academia",value:120,category:"health",dueDay:5,active:true,icon:"💪"}]};
}

// ── STATE ────────────────────────────────────────────────────
let U=null,D=null,PAGE="dashboard",REP_Y=new Date().getFullYear(),REP_M=new Date().getMonth(),FT="all",FC="all",FS="",FP="all",FM="all",ADD_TO=null,ADD_VAL="",DASH_SEL=null,CMP_A=null,CMP_B=null;

// ── AUTH ─────────────────────────────────────────────────────
function showAuth(){
  document.getElementById("app-screen").style.display="none";
  const el=document.getElementById("auth-screen");el.style.display="flex";
  let mode="login";
  const render=()=>{
    el.innerHTML=`<div class="auth-box">
      <div class="logo">Gasto0</div><div class="logo-sub">Controle financeiro inteligente ✦</div>
      <div class="tabs">
        <button class="tab ${mode==="login"?"on":""}" onclick="authMode('login')">Entrar</button>
        <button class="tab ${mode==="register"?"on":""}" onclick="authMode('register')">Criar conta</button>
      </div>
      <div id="aerr"></div>
      ${mode==="register"?`<div class="fl"><label>Nome completo</label><input class="inp" id="an" placeholder="Seu nome"/></div>`:""}
      <div class="fl"><label>Email</label><input class="inp" id="ae" type="email" placeholder="seu@email.com"/></div>
      <div class="fl"><label>Senha</label><input class="inp" id="ap" type="password" placeholder="••••••••"/></div>
      <button class="btn-main" onclick="doAuth()">${mode==="login"?"Entrar na conta":"Criar conta grátis"}</button>
      <div class="demo-hint">Demo: joao@gasto0.com / 123456</div>
    </div>`;
    ["ae","ap"].forEach(id=>{const e=document.getElementById(id);if(e)e.onkeydown=ev=>{if(ev.key==="Enter")doAuth();};});
  };
  window.authMode=m=>{mode=m;render();};
  window.doAuth=async()=>{
    const email=(document.getElementById("ae")||{}).value||"";
    const pass=(document.getElementById("ap")||{}).value||"";
    const errEl=document.getElementById("aerr");
    const setErr=m=>{errEl.innerHTML=`<div class="err">${m}</div>`};
    const btn=document.querySelector('.btn-main');
    if(btn){btn.textContent="Aguarde...";btn.disabled=true;}
    const name=mode==="register"?((document.getElementById("an")||{}).value||""):"";
    const res=await apiAuth(mode,email,pass,name);
    if(res.error){
      setErr(res.error);
      if(btn){btn.textContent=mode==="login"?"Entrar na conta":"Criar conta grátis";btn.disabled=false;}
      return;
    }
    // Salva user no cache local para restaurar sessão
    LS.s("g0_session",{uid:res.user.id});
    LS.s("g0_user_"+res.user.id, res.user);
    el.style.display="none";
    await doLogin(res.user);
  };
  render();
}

async function doLogin(u){
  U={id:u.id,name:u.name,email:u.email};
  LS.s("g0_user_"+u.id,{id:u.id,name:u.name,email:u.email}); // cache local
  // Mostra loading
  document.getElementById("auth-screen").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:14px"><div style="font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#9B85FF,#00E5A0);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Gasto0</div><div style="color:#8888A8;font-size:.84rem">Carregando seus dados...</div></div>';
  D=await apiLoad(u.id);
  renderApp();
}
function doLogout(){LS.d("g0_session");U=null;D=null;showAuth();}
function save(nd){D=nd;if(U)apiSave(U.id,nd);renderMain();}

function renderApp(){
  document.getElementById("auth-screen").style.display="none";
  document.getElementById("app-screen").style.display="block";
  renderSidebar();renderMain();
}

// ── SIDEBAR ──────────────────────────────────────────────────
function renderSidebar(){
  const now=new Date();
  const urgB=(D.bills||[]).filter(b=>{if(!b.active)return false;const dt=new Date(now.getFullYear(),now.getMonth(),b.dueDay);return Math.ceil((dt-now)/864e5)<=3&&Math.ceil((dt-now)/864e5)>=0;});
  const ini=U.name.split(" ").map(n=>n[0]).slice(0,2).join("").toUpperCase();
  const nav=[{id:"dashboard",ic:"◼",lbl:"Dashboard"},{id:"transactions",ic:"↕",lbl:"Transações"},{id:"cards",ic:"💳",lbl:"Cartões"},{id:"goals",ic:"🎯",lbl:"Metas"},{id:"bills",ic:"📋",lbl:"Contas Fixas"},{id:"categories",ic:"🏷",lbl:"Categorias"},{id:"reports",ic:"📊",lbl:"Relatórios"},{id:"insights",ic:"✦",lbl:"Insights IA"},{id:"sync",ic:"🔄",lbl:"Sincronização"}];

    <div class="sb-foot">

    </div>`;
}
window.goPage=p=>{PAGE=p;FS="";FT="all";FC="all";FP="all";FM="all";ADD_TO=null;ADD_VAL="";DASH_SEL=null;CMP_A=null;CMP_B=null;renderSidebar();renderMain();};

// ── MAIN ─────────────────────────────────────────────────────
function renderMain(){
  const el=document.getElementById("main");
  const pages={dashboard:pgDashboard,transactions:pgTransactions,cards:pgCards,goals:pgGoals,bills:pgBills,categories:pgCategories,reports:pgReports,insights:pgInsights,sync:pgSync};
  el.innerHTML=(pages[PAGE]||pgDashboard)();
}

function getCat(id){return(D.categories||CATS).find(c=>c.id===id)||{icon:"📦",label:id,color:"#888"};}
function curTxs(){const now=new Date(),cm=now.getMonth(),cy=now.getFullYear();return(D.transactions||[]).filter(t=>{const d=new Date(t.date);return d.getMonth()===cm&&d.getFullYear()===cy;});}

function genIns(){
  const txs=D.transactions||[],cats=D.categories||CATS;
  const now=new Date(),cm=now.getMonth(),cy=now.getFullYear(),lm=cm===0?11:cm-1,ly=cm===0?cy-1:cy;
  const cur=txs.filter(t=>{const d=new Date(t.date);return d.getMonth()===cm&&d.getFullYear()===cy;});
  const lst=txs.filter(t=>{const d=new Date(t.date);return d.getMonth()===lm&&d.getFullYear()===ly;});
  const sum=(a,tp)=>a.filter(t=>t.type===tp).reduce((s,t)=>s+t.value,0);
  const ci=sum(cur,"income"),ce=sum(cur,"expense"),le=sum(lst,"expense");
  const ins=[];
  if(ce>ci&&ci>0)ins.push({type:"danger",icon:"🚨",title:"Gastos acima da renda",msg:`Gastou ${fmt(ce-ci)} a mais do que recebeu.`,p:1});
  if(le>0){const v=((ce-le)/le)*100;if(v>20)ins.push({type:"warning",icon:"📈",title:"Gastos em alta",msg:`Despesas subiram ${v.toFixed(0)}% vs mês passado.`,p:2});else if(v<-10)ins.push({type:"success",icon:"🎉",title:"Ótimo controle!",msg:`Reduziu ${Math.abs(v).toFixed(0)}% vs mês anterior.`,p:4});}
  const cS={};cats.forEach(c=>{cS[c.id]=cur.filter(t=>t.type==="expense"&&t.category===c.id).reduce((s,t)=>s+t.value,0);});
  const top=cats.reduce((t,c)=>(cS[c.id]||0)>(cS[t?.id]||0)?c:t,cats[0]);
  if(top&&cS[top.id]>0&&ce>0)ins.push({type:"info",icon:top.icon,title:`Principal: ${top.label}`,msg:`${top.label} = ${((cS[top.id]/ce)*100).toFixed(0)}% dos gastos (${fmt(cS[top.id])}).`,p:6});
  if(ci>0&&ce<ci*0.8)ins.push({type:"success",icon:"💚",title:"Finanças saudáveis",msg:`Economizando ${(100-ce/ci*100).toFixed(0)}% da renda!`,p:5});
  return ins.sort((a,b)=>a.p-b.p);
}
const rI=i=>`<div class="icard ${i.type}"><div class="iic">${i.icon}</div><div><div class="it">${i.title}</div><div class="im">${i.msg}</div></div></div>`;

// ── DASHBOARD ────────────────────────────────────────────────

function pgDashboard(){
  const txs=D.transactions||[],cats=D.categories||CATS,cur=curTxs();
  const now=new Date();
  const ti=cur.filter(t=>t.type==="income").reduce((a,t)=>a+t.value,0);
  const te=cur.filter(t=>t.type==="expense").reduce((a,t)=>a+t.value,0);
  const bal=ti-te;
  const hs=ti>0?Math.max(0,Math.min(100,(1-te/ti)*100)):0;
  const hc=hs>70?"var(--grn)":hs>40?"var(--ylw)":"var(--red)";

  // ── 12 meses de histórico para gráficos ───────────────────
  const months12=Array.from({length:12},(_,i)=>{
    let m=now.getMonth()-11+i,y=now.getFullYear();
    while(m<0){m+=12;y--;}
    const mt=txs.filter(t=>{const d=new Date(t.date);return d.getMonth()===m&&d.getFullYear()===y;});
    return{
      m,y,
      lbl:new Date(y,m,1).toLocaleString("pt-BR",{month:"short"}).replace(".",""),
      inc:mt.filter(t=>t.type==="income").reduce((a,t)=>a+t.value,0),
      exp:mt.filter(t=>t.type==="expense").reduce((a,t)=>a+t.value,0),
    };
  });
  const mxMain=Math.max(...months12.map(d=>Math.max(d.inc,d.exp)),1);

  // ── Acumulado até hoje ─────────────────────────────────────
  const totalIncAll=txs.filter(t=>t.type==="income").reduce((a,t)=>a+t.value,0);
  const totalExpAll=txs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.value,0);
  const totalBalAll=totalIncAll-totalExpAll;

  // ── Gráfico de categorias por mês (últimos 6 meses) ───────
  const months6=months12.slice(6);
  const topCats=cats.map(c=>({
    ...c,
    total:txs.filter(t=>t.type==="expense"&&t.category===c.id).reduce((a,t)=>a+t.value,0)
  })).filter(c=>c.total>0).sort((a,b)=>b.total-a.total).slice(0,4);

  // Para cada mês, valor por categoria
  const catByMonth=months6.map(mo=>({
    lbl:mo.lbl,
    cats:topCats.map(cat=>({
      ...cat,
      val:txs.filter(t=>{
        const d=new Date(t.date);
        return t.type==="expense"&&t.category===cat.id&&d.getMonth()===mo.m&&d.getFullYear()===mo.y;
      }).reduce((a,t)=>a+t.value,0)
    }))
  }));
  const mxCat=Math.max(...catByMonth.flatMap(m=>m.cats.map(c=>c.val)),1);

  // ── Gráfico SVG: Receita vs Despesa 12 meses ──────────────
  const W=500,H=100,barW=14,gap=Math.floor((W-12*(barW*2+2))/13),padL=4;
  const svgBars=months12.map((d,i)=>{
    const x=padL+i*(barW*2+2+gap);
    const iH=Math.round((d.inc/mxMain)*(H-4));
    const eH=Math.round((d.exp/mxMain)*(H-4));
    const isCur=d.m===now.getMonth()&&d.y===now.getFullYear();
    return`<g>
      <rect x="${x}" y="${H-iH}" width="${barW}" height="${iH}" rx="2" fill="${isCur?"rgba(0,229,160,.95)":"rgba(0,229,160,.45)"}" title="Rec: ${fmt(d.inc)}"/>

  const tInc=all.filter(t=>t.type==="income").reduce((a,t)=>a+t.value,0);

  const nAll=all.length;
  const nInc=all.filter(t=>t.type==="income").length;
  const nExp=all.filter(t=>t.type==="expense").length;
  const nPaid=all.filter(t=>t.paid).length;
  const nUnpaid=all.filter(t=>!t.paid).length;

  const txs=all.filter(t=>{
    if(FT!=="all"&&t.type!==FT)return false;
    if(FC!=="all"&&t.category!==FC)return false;

    if(FP==="unpaid"&&t.paid)return false;
    if(FM!=="all"){const d=new Date(t.date);const key=d.getFullYear()+"-"+d.getMonth();if(key!==FM)return false;}
    if(FS){const q=FS.toLowerCase(),c=getCat(t.category);return(t.description||"").toLowerCase().includes(q)||(c.label||"").toLowerCase().includes(q);}
    return true;
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));

  // Subtotais da lista filtrada
  const filtInc=txs.filter(t=>t.type==="income").reduce((a,t)=>a+t.value,0);
  const filtExp=txs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.value,0);

  // Meses disponíveis para o filtro
  const txMonths=[];

  all.forEach(t=>{
    const d=new Date(t.date);

      seenM.add(key);
      txMonths.push({key,y:d.getFullYear(),m:d.getMonth(),

// ── CARDS ── Fatura do mes atual ─────────────────────────────
function getInv(card){
  const now=new Date();
  const cm=now.getMonth(),cy=now.getFullYear();
  // Todas despesas deste cartao no mes atual
  const txs=(D.transactions||[]).filter(t=>{
    if(t.type!=="expense")return false;
    if(!t.cardId||String(t.cardId)!==String(card.id))return false;
    const d=new Date(t.date);
    return d.getMonth()===cm&&d.getFullYear()===cy;
  });
  const total=txs.reduce((a,t)=>a+t.value,0);
  const pct=card.limit>0?(total/card.limit)*100:0;
  let dueM=cm,dueY=cy;
  if(now.getDate()>card.closingDay){dueM++;if(dueM>11){dueM=0;dueY++;}}
  const due=new Date(dueY,dueM,card.dueDay).toLocaleDateString("pt-BR");
  return{total,pct,status:pct>90?"danger":pct>70?"warn":"safe",txs,due};
}

function getCardHistory(card){
  // Últimos 6 meses de gasto no cartão
  const now=new Date();
  const months=[];
  for(let i=5;i>=0;i--){
    let m=now.getMonth()-i, y=now.getFullYear();
    while(m<0){m+=12;y--;}
    const txs=(D.transactions||[]).filter(t=>{
      if(t.type!=="expense")return false;
      if(!t.cardId||String(t.cardId)!==String(card.id))return false;
      const d=new Date(t.date);
      return d.getMonth()===m&&d.getFullYear()===y;
    });
    const total=txs.reduce((a,t)=>a+t.value,0);
    const lbl=new Date(y,m,1).toLocaleString("pt-BR",{month:"short"}).replace(".","");
    months.push({m,y,lbl,total,count:txs.length});
  }
  return months;
}

    <div style="display:flex;gap:8px">
      <span style="font-size:.7rem;padding:2px 9px;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--grn);border-radius:20px;font-weight:600">✅ ${nPaid} pagas</span>
      <span style="font-size:.7rem;padding:2px 9px;background:rgba(255,184,48,.1);border:1px solid rgba(255,184,48,.3);color:var(--ylw);border-radius:20px;font-weight:600">⏳ ${nUnpaid} pendentes</span>
    </div>
  </div>
    ${bills.map(b=>{
      const cat=cats.find(c=>c.id===b.category)||{icon:"📦",label:b.category};
      const due=new Date(now.getFullYear(),now.getMonth(),b.dueDay);
      const dl=Math.ceil((due-now)/864e5);
      const isU=dl>=0&&dl<=3&&b.active;
      const isPaid=isBillPaidThisMonth(b);

        <div class="bi2">
          <div class="bn" style="text-decoration:${isPaid?"line-through":""};color:${isPaid?"var(--txt2)":"var(--txt)"}">${b.name}</div>

// ── REPORTS ──────────────────────────────────────────────────
function pgReports(){
  const txs=D.transactions||[],cats=D.categories||CATS;
  const now=new Date();
  const isCur=REP_Y===now.getFullYear()&&REP_M===now.getMonth();
  const mTxs=txs.filter(t=>{const d=new Date(t.date);return d.getFullYear()===REP_Y&&d.getMonth()===REP_M;});
  const ti=mTxs.filter(t=>t.type==="income").reduce((a,t)=>a+t.value,0);
  const te=mTxs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.value,0);
  const bal=ti-te,sav=ti>0?((bal/ti)*100):0;
  const catS=cats.map(c=>({...c,total:mTxs.filter(t=>t.type==="expense"&&t.category===c.id).reduce((a,t)=>a+t.value,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const mxC=catS[0]?.total||1;
  const hist=Array.from({length:6},(_,i)=>{let m=REP_M-5+i,y=REP_Y;while(m<0){m+=12;y--}const t=txs.filter(tx=>{const d=new Date(tx.date);return d.getFullYear()===y&&d.getMonth()===m;});const inc=t.filter(tx=>tx.type==="income").reduce((a,tx)=>a+tx.value,0);const exp=t.filter(tx=>tx.type==="expense").reduce((a,tx)=>a+tx.value,0);return{m,y,lbl:MONTHS[m].slice(0,3)+"/"+String(y).slice(2),inc,exp,bal:inc-exp};});
  const mxH=Math.max(...hist.map(h=>Math.max(h.inc,h.exp)),1);
  const worst=hist.filter(h=>h.exp>0).sort((a,b)=>a.bal-b.bal)[0];
  const best=hist.filter(h=>h.inc>0).sort((a,b)=>b.bal-a.bal)[0];
  const alerts=[];
  if(te>ti&&ti>0)alerts.push({type:"danger",icon:"🚨",title:"Gastos acima da renda!",text:`Gastou ${fmt(te-ti)} a mais em ${MONTHS[REP_M]}.`});
  if(catS.length>0&&te>0&&catS[0].total/te>0.5)alerts.push({type:"warning",icon:"⚠️",title:"Concentração",text:`${catS[0].label} > 50% das despesas.`});
  if(sav>20)alerts.push({type:"success",icon:"🎉",title:"Ótimo mês!",text:`Economizou ${sav.toFixed(0)}% da renda.`});

  // Todos os meses com transações para o seletor de histórico
  const allMonths=[];const seenR=new Set();
  txs.forEach(t=>{const d=new Date(t.date);const key=d.getFullYear()+"-"+d.getMonth();if(!seenR.has(key)){seenR.add(key);allMonths.push({y:d.getFullYear(),m:d.getMonth()});}});
  allMonths.sort((a,b)=>b.y-a.y||b.m-a.m);

  return`<div class="ph">
    <div><h1>Relatórios</h1><div class="sub">Análise mensal</div></div>
    <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
      <div class="mnav"><button class="mb" onclick="repPrev()">‹</button><div class="ml">${MONTHS[REP_M]} ${REP_Y}</div><button class="mb" onclick="repNext()" style="opacity:${isCur?.4:1}">›</button></div>
      <select class="fsel inp" style="font-size:.74rem" onchange="const[y,m]=this.value.split('-').map(Number);REP_Y=y;REP_M=m;renderMain()">
        ${allMonths.map(mo=>{const key=mo.y+'-'+mo.m;const sel=REP_Y===mo.y&&REP_M===mo.m;const lbl=MONTHS[mo.m]+' '+mo.y;return`<option value="${key}"${sel?' selected':''}>${lbl}</option>`;}).join('')}
      </select>
    </div>
  </div>
  ${alerts.map(a=>`<div class="alrt ${a.type}"><div class="aic">${a.icon}</div><div class="ab"><strong>${a.title}</strong>${a.text}</div></div>`).join("")}
  ${mTxs.length===0?`<div class="panel" style="text-align:center;padding:48px 20px"><div class="empty-ic">📭</div><div class="empty-t">Sem transações em ${MONTHS[REP_M]}</div></div>`:`
  <div class="panel rpanel full" style="margin-bottom:11px"><div class="pt">Resumo de ${MONTHS[REP_M]}</div>
    <div class="smets">${[["Receitas",fmt(ti),"vg"],["Despesas",fmt(te),"vr"],["Saldo",fmt(bal),bal>=0?"vg":"vr"],["Economia",sav.toFixed(0)+"%",sav>=0?"va":"vr"],["Trans.",mTxs.length,"vt"],["Top",catS[0]?catS[0].icon+" "+catS[0].label:"—","vy"]].map(([l,v,c])=>`<div class="smi"><div class="sml">${l}</div><div class="smv ${c}" style="${l==="Top"?"font-size:.66rem":""}">${v}</div></div>`).join("")}</div>
  </div>
  <div class="rgrid">
    <div class="rpanel"><div class="pt">Onde mais gastou</div>${catS.map((c,i)=>`<div class="ri"><div class="rpos">#${i+1}</div><span style="font-size:.88rem">${c.icon}</span><div class="rinf"><div class="rn">${c.label}</div><div class="rbg"><div class="rfill" style="width:${(c.total/mxC)*100}%;background:${c.color}"></div></div></div><div class="rv" style="color:${c.color}">${fmt(c.total)}</div></div>`).join("")}</div>
    <div class="rpanel"><div class="pt">Detalhamento por categoria</div>
      ${catS.length===0?`<div style="color:var(--txt2);font-size:.76rem;text-align:center;padding:16px 0">Sem despesas</div>`:`
      <div style="display:flex;flex-direction:column;gap:10px">

window.closeM=()=>{document.getElementById("modal-root").innerHTML="";};

function renderM(){
  const map={tx:mTx,editTx:mTx,addCard:mCard,editCard:mCard,addGoal:mGoal,editGoal:mGoal,addBill:mBill,editBill:mBill,addCat:mCat,editCat:mCat};
  const fn=map[MS.type];
  if(!fn)return;
  document.getElementById("modal-root").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeM()">${fn()}</div>`;
}

function mTx(){
  const cats=D.categories||CATS;const cards=D.cards||[];
  const isEdit=MS.type==="editTx";
  return`<div class="modal">
    <div class="mh"><h2>${isEdit?"Editar":"Nova"} Transação</h2><button class="mclose" onclick="closeM()">✕</button></div>
    <div class="ttog">
      <button class="tbtn expense${MS.txType==="expense"?" on":""}" onclick="MS.txType='expense';renderM()">↓ Despesa</button>
      <button class="tbtn income${MS.txType==="income"?" on":""}" onclick="MS.txType='income';renderM()">↑ Receita</button>
    </div>
    <div class="frow2">
      <div class="fl"><label>Valor (R$)</label><input class="inp" id="txv" type="number" placeholder="0,00" value="${MS.value||""}"/></div>
      <div class="fl"><label>Data</label><input class="inp" id="txd" type="date" value="${MS.date||tod()}"/></div>
    </div>
    <div class="fl"><label>Categoria</label><select class="inp" id="txc">${cats.map(c=>`<option value="${c.id}"${MS.category===c.id?" selected":""}>${c.icon} ${c.label}</option>`).join("")}</select></div>
    ${MS.txType==="expense"&&cards.length>0?`<div class="fl"><label>Cartão (opcional)</label><select class="inp" id="txcard"><option value="">Sem cartão (débito/dinheiro)</option>${cards.map(c=>`<option value="${c.id}"${String(MS.cardId)===String(c.id)?" selected":""}>💳 ${c.name}</option>`).join("")}</select></div>`:""}
    <div class="fl"><label>Descrição (opcional)</label><input class="inp" id="txdesc" placeholder="Ex: Almoço no trabalho" value="${MS.description||""}"/></div>
    <div class="macts">
      <button class="btn-cancel" onclick="closeM()">Cancelar</button>
      <button class="btn-save" onclick="saveTx()">${isEdit?"Salvar alterações":"Salvar"}</button>
    </div>
  </div>`;
}
window.saveTx=()=>{
  const v=parseFloat((document.getElementById("txv")||{}).value||0);
  if(!v||isNaN(v))return;
  const cardEl=document.getElementById("txcard");
  const tx={id:MS.id||Date.now().toString(),type:MS.txType,value:v,category:(document.getElementById("txc")||{}).value||"others",date:(document.getElementById("txd")||{}).value||tod(),description:(document.getElementById("txdesc")||{}).value||"",cardId:cardEl&&cardEl.value?cardEl.value:null};
  const txs=D.transactions||[];
  save({...D,transactions:MS.id?txs.map(t=>t.id===MS.id?tx:t):[...txs,tx]});
  closeM();
};

function mCard(){
  const isEdit=MS.type==="editCard";
  return`<div class="modal">
    <div class="mh"><h2>${isEdit?"Editar":"Novo"} Cartão</h2><button class="mclose" onclick="closeM()">✕</button></div>
    <div class="fl"><label>Nome</label><input class="inp" id="cn" value="${MS.name||""}" placeholder="Ex: Nubank"/></div>
    <div class="fl"><label>Limite (R$)</label><input class="inp" id="cl" type="number" value="${MS.limit||""}" placeholder="5000"/></div>
    <div class="frow2">
      <div class="fl"><label>Dia fechamento</label><input class="inp" id="ccd" type="number" min="1" max="31" value="${MS.closingDay||""}" placeholder="10"/></div>
      <div class="fl"><label>Dia vencimento</label><input class="inp" id="cdd" type="number" min="1" max="31" value="${MS.dueDay||""}" placeholder="17"/></div>
    </div>
    <div class="fl"><label>Cor</label><div class="cpicker">${CC.map(c=>`<div class="cpk${(MS.color||"#7B61FF")===c?" on":""}" style="background:${c}" onclick="MS.color='${c}';renderM()"></div>`).join("")}</div></div>
    <div class="macts"><button class="btn-cancel" onclick="closeM()">Cancelar</button><button class="btn-save" onclick="saveCard()">Salvar</button></div>
  </div>`;
}
window.saveCard=()=>{
  const n=(document.getElementById("cn")||{}).value||"";const l=(document.getElementById("cl")||{}).value||"";if(!n||!l)return;
  const card={id:MS.id||Date.now().toString(),name:n,limit:Number(l),closingDay:Number((document.getElementById("ccd")||{}).value)||10,dueDay:Number((document.getElementById("cdd")||{}).value)||15,color:MS.color||"#7B61FF"};
  const cards=D.cards||[];save({...D,cards:MS.id?cards.map(c=>c.id===MS.id?card:c):[...cards,card]});closeM();
};

function mGoal(){
  const isEdit=MS.type==="editGoal";const ic=MS.icon||"🎯";const co=MS.color||"#7B61FF";
  const gc=["#7B61FF","#00E5A0","#4B8BFF","#FFB830","#FF4B6B","#4ECDC4","#DDA0DD","#96CEB4"];
  return`<div class="modal">
    <div class="mh"><h2>${isEdit?"Editar":"Nova"} Meta</h2><button class="mclose" onclick="closeM()">✕</button></div>
    <div class="fl"><label>Nome</label><input class="inp" id="gn" value="${MS.name||""}" placeholder="Ex: Viagem Europa"/></div>
    <div class="frow2">
      <div class="fl"><label>Objetivo (R$)</label><input class="inp" id="gt" type="number" value="${MS.target||""}" placeholder="10000"/></div>
      <div class="fl"><label>Já guardado (R$)</label><input class="inp" id="gs" type="number" value="${MS.saved||0}" placeholder="0"/></div>
    </div>
    <div class="fl"><label>Prazo</label><input class="inp" id="gd" type="date" value="${MS.deadline||""}"/></div>
    <div class="fl"><label>Ícone</label><div class="ipicker">${GI.map(i=>`<div class="ipk${ic===i?" on":""}" onclick="MS.icon='${i}';renderM()">${i}</div>`).join("")}</div></div>
    <div class="fl"><label>Cor</label><div class="cpicker">${gc.map(c=>`<div class="cpk${co===c?" on":""}" style="background:${c}" onclick="MS.color='${c}';renderM()"></div>`).join("")}</div></div>
    <div class="macts"><button class="btn-cancel" onclick="closeM()">Cancelar</button><button class="btn-save" onclick="saveGoal()">Salvar</button></div>
  </div>`;
}
window.saveGoal=()=>{
  const n=(document.getElementById("gn")||{}).value||"";const t=(document.getElementById("gt")||{}).value||"";if(!n||!t)return;
  const g={id:MS.id||Date.now().toString(),name:n,target:Number(t),saved:Number((document.getElementById("gs")||{}).value)||0,deadline:(document.getElementById("gd")||{}).value||"",icon:MS.icon||"🎯",color:MS.color||"#7B61FF"};
  const goals=D.goals||[];save({...D,goals:MS.id?goals.map(x=>x.id===MS.id?g:x):[...goals,g]});closeM();
};

function mBill(){const isEdit=MS.type==="editBill";
  const cats=D.categories||CATS;const ic=MS.billIcon||"💡";
  return`<div class="modal">
    <div class="mh"><h2>${isEdit?"Editar":"Nova"} Conta Fixa</h2><button class="mclose" onclick="closeM()">✕</button></div>
    <div class="fl"><label>Nome</label><input class="inp" id="bn" value="${MS.name||""}" placeholder="Ex: Netflix"/></div>
    <div class="frow2">
      <div class="fl"><label>Valor (R$)</label><input class="inp" id="bv" type="number" value="${MS.value||""}" placeholder="45.90"/></div>
      <div class="fl"><label>Dia vencimento</label><input class="inp" id="bd" type="number" min="1" max="31" value="${MS.dueDay||""}" placeholder="15"/></div>
    </div>
    <div class="fl"><label>Categoria</label><select class="inp" id="bc">${cats.map(c=>`<option value="${c.id}"${MS.category===c.id?" selected":""}>${c.icon} ${c.label}</option>`).join("")}</select></div>
    <div class="fl"><label>Ícone</label><div class="ipicker">${BI.map(i=>`<div class="ipk${ic===i?" on":""}" onclick="MS.billIcon='${i}';renderM()">${i}</div>`).join("")}</div></div>
    <div class="macts"><button class="btn-cancel" onclick="closeM()">Cancelar</button><button class="btn-save" onclick="saveBill()">${isEdit?"Salvar":"Adicionar"}</button></div>
  </div>`;
}
window.saveBill=()=>{
  const n=(document.getElementById("bn")||{}).value||"";const v=(document.getElementById("bv")||{}).value||"";if(!n||!v)return;
  const bill={id:MS.id||Date.now().toString(),name:n,value:Number(v),category:(document.getElementById("bc")||{}).value||"others",dueDay:Number((document.getElementById("bd")||{}).value)||10,icon:MS.billIcon||"💡",active:MS.active!==undefined?MS.active:true};
  const bills=D.bills||[];
  save({...D,bills:MS.id?bills.map(b=>b.id===MS.id?bill:b):[...bills,bill]});closeM();
};

function mCat(){
  const isEdit=MS.type==="editCat";const ic=MS.icon||"📦";const co=MS.color||"#B0C4DE";
  return`<div class="modal">
    <div class="mh"><h2>${isEdit?"Editar":"Nova"} Categoria</h2><button class="mclose" onclick="closeM()">✕</button></div>
    <div class="fl"><label>Nome</label><input class="inp" id="catn" value="${MS.label||""}" placeholder="Ex: Pets"/></div>
    <div class="fl"><label>Ícone</label><div class="ipicker">${CI.map(i=>`<div class="ipk${ic===i?" on":""}" onclick="MS.icon='${i}';renderM()">${i}</div>`).join("")}</div></div>
    <div class="fl"><label>Cor</label><div class="cpicker">${CO.map(c=>`<div class="cpk${co===c?" on":""}" style="background:${c}" onclick="MS.color='${c}';renderM()"></div>`).join("")}</div></div>
    <div class="macts"><button class="btn-cancel" onclick="closeM()">Cancelar</button><button class="btn-save" onclick="saveCat()">Salvar</button></div>
  </div>`;
}
window.saveCat=()=>{
  const l=(document.getElementById("catn")||{}).value||"";if(!l)return;
  const cat={id:MS.id||l.toLowerCase().replace(/\s+/g,"-")+"-"+Date.now(),label:l,icon:MS.icon||"📦",color:MS.color||"#B0C4DE",d:false};
  const cats=D.categories||CATS;save({...D,categories:MS.id?cats.map(c=>c.id===MS.id?cat:c):[...cats,cat]});closeM();
};

// ── INIT ─────────────────────────────────────────────────────
(async function init(){
  const s=LS.g("g0_session");
  if(s?.uid){
    // Tenta restaurar sessão — carrega dados do servidor
    const uid=s.uid;
    const localCache=LS.g("g0_user_"+uid);
    if(localCache){
      await doLogin(localCache);
      return;
    }
    // sem cache local, vai para auth
  }
  showAuth();
})();

// ── MODAL DE CONFIRMAÇÃO ─────────────────────────────────────
// Evita confirm() nativo que pode ser bloqueado pelo browser
function showConfirm(msg, onYes){
  const el=document.getElementById("modal-root");
  el.innerHTML=`<div class="overlay">
    <div class="modal" style="max-width:320px;text-align:center">
      <div style="font-size:1.5rem;margin-bottom:10px">⚠️</div>
      <div style="font-size:.9rem;color:var(--txt);margin-bottom:18px">${msg}</div>
      <div style="display:flex;gap:8px">
        <button class="btn-cancel" style="flex:1" onclick="closeM()">Cancelar</button>
        <button class="btn-save" style="flex:1;background:linear-gradient(135deg,var(--red),#c0392b)" id="confirm-yes">Confirmar</button>
      </div>
    </div>
  </div>`;
  document.getElementById("confirm-yes").onclick=()=>{closeM();onYes();};
}

// ── EVENT DELEGATION ──────────────────────────────────────────
document.addEventListener('click',function(e){
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const id=btn.dataset.id;
  const action=btn.dataset.action;
  if(action==='delBill'){
    showConfirm("Remover esta conta fixa?",()=>save({...D,bills:(D.bills||[]).filter(b=>b.id!==id)}));
  }else if(action==='togBill'){
    save({...D,bills:(D.bills||[]).map(b=>b.id===id?{...b,active:!b.active}:b)});
  }else if(action==='editBill'){
    openM('editBill',id);
  }else if(action==='editTx'){
    openM('editTx',id);
  }else if(action==='delCard'){
    showConfirm("Remover este cartão?",()=>save({...D,cards:(D.cards||[]).filter(c=>c.id!==id)}));
  }else if(action==='delGoal'){
    showConfirm("Remover esta meta?",()=>save({...D,goals:(D.goals||[]).filter(g=>g.id!==id)}));
  }else if(action==='delCat'){
    showConfirm("Remover esta categoria?",()=>save({...D,categories:(D.categories||CATS).filter(c=>c.id!==id)}));
  }else if(action==='delTx'){
    showConfirm("Excluir esta transação?",()=>save({...D,transactions:(D.transactions||[]).filter(t=>t.id!==id)}));
  }else if(action==='togPaid'){
    save({...D,transactions:(D.transactions||[]).map(t=>t.id===id?{...t,paid:!(t.paid===true||(t.paid===undefined&&t.type==="income"))}:t)});
  }
});
</script>
