<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080810;--bg2:#0F0F1A;--bg3:#161625;--bg4:#1E1E30;--txt:#EEEEF8;--txt2:#7878A0;--acc:#8B5CF6;--acc2:#A78BFA;--grn:#10B981;--red:#F43F5E;--ylw:#F59E0B;--blu:#3B82F6;--pnk:#EC4899;--cyn:#06B6D4;--brd:rgba(255,255,255,0.06);--brd2:rgba(255,255,255,0.12);--rad:14px;--rad2:20px}
/* ══ TEMA CLARO — COMPLETO ══════════════════════════════════ */
[data-theme="light"]{
  --bg:#F5F4F0;
  --bg2:#FDFCFA;
  --bg3:#EBE9E4;
  --bg4:#DDD9D2;
  --txt:#0F1130;
  --txt2:#5A5F80;
  --acc:#6C4FE8;
  --acc2:#7B61FF;
  --grn:#00875A;
  --red:#D9304F;
  --ylw:#B87800;
  --blu:#2563EB;
  --brd:rgba(0,0,0,0.09);
  --brd2:rgba(0,0,0,0.18);
  --rad:12px
}
/* Auth */
[data-theme="light"] #auth-screen{background:linear-gradient(135deg,#EEF0FF 0%,#F0FFF8 100%)}
[data-theme="light"] .auth-box{background:#fff;border-color:rgba(108,79,232,.2);box-shadow:0 8px 40px rgba(108,79,232,.12)}
/* Sidebar */
[data-theme="light"] .sidebar{background:#FDFCFA;border-right:1px solid rgba(0,0,0,.08)}
[data-theme="light"] .nav:hover{background:#F0F2F8}
[data-theme="light"] .nav.on{background:rgba(108,79,232,.1);color:#6C4FE8}
[data-theme="light"] .sb-logo{-webkit-text-fill-color:transparent;background:linear-gradient(135deg,#6C4FE8,#00875A);-webkit-background-clip:text;background-clip:text}
/* Hero card — gradiente vibrante no claro */
[data-theme="light"] .hero-card{background:linear-gradient(160deg,#FDFCFA 0%,#F0EEF8 100%);box-shadow:0 6px 24px rgba(108,79,232,.1);border:1px solid rgba(108,79,232,.15)}
[data-theme="light"] .hero-card::before{background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%)}
[data-theme="light"] .hero-card::after{background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%)}
[data-theme="light"] .hero-pill{background:#FFFFFF;border:1px solid rgba(108,79,232,.12);box-shadow:0 2px 8px rgba(0,0,0,.06)}
[data-theme="light"] .hero-label{color:#5A5F80}
[data-theme="light"] .hero-amount{color:#0F1130;text-shadow:none}
[data-theme="light"] .hero-sub{color:#5A5F80}
[data-theme="light"] .hero-pill-lbl{color:#7878A0}
[data-theme="light"] .hero-pill-val{color:#0F1130}
/* Mini cards */
[data-theme="light"] .mini-card{background:#FDFCFA;border:1px solid rgba(0,0,0,.08);box-shadow:0 2px 8px rgba(0,0,0,.06)}
/* Chart modern */
[data-theme="light"] .chart-modern{background:#FDFCFA;border:1px solid rgba(0,0,0,.08);box-shadow:0 2px 8px rgba(0,0,0,.05)}
/* Cards gerais */
[data-theme="light"] .sc{background:#FDFCFA;border-color:rgba(0,0,0,.08);box-shadow:0 2px 6px rgba(0,0,0,.05)}
[data-theme="light"] .panel{background:#FDFCFA;border-color:rgba(0,0,0,.08)}
/* Tabela */
[data-theme="light"] .ttable{background:#FDFCFA;border-color:rgba(0,0,0,.08)}
[data-theme="light"] .thead{background:#F0F2F8}
[data-theme="light"] .trow:hover{background:#F5F6FC}
/* Modal */
[data-theme="light"] .modal{background:#FDFCFA;border-color:rgba(0,0,0,.15);box-shadow:0 20px 60px rgba(0,0,0,.18)}
[data-theme="light"] .overlay{background:rgba(0,0,0,.45)}
/* Inputs */
[data-theme="light"] .inp{background:#F5F6FC;border-color:rgba(0,0,0,.12);color:#0F1130}
[data-theme="light"] .inp:focus{border-color:#6C4FE8;box-shadow:0 0 0 2px rgba(108,79,232,.15)}
[data-theme="light"] .inp option{background:#fff;color:#0F1130}
[data-theme="light"] .fsel{background:#F5F6FC;border-color:rgba(0,0,0,.12);color:#0F1130}
[data-theme="light"] .fsearch{background:#F5F6FC;border-color:rgba(0,0,0,.12);color:#0F1130}
/* Botões */
[data-theme="light"] .btn-s{background:#F0F2F8;border-color:rgba(0,0,0,.12);color:#5A5F80}
[data-theme="light"] .btn-s:hover{color:#0F1130;border-color:rgba(0,0,0,.2)}
[data-theme="light"] .btn-g{background:rgba(0,135,90,.08);border-color:rgba(0,135,90,.25);color:#00875A}
[data-theme="light"] .btn-d{background:rgba(217,48,79,.08);border-color:rgba(217,48,79,.25);color:#D9304F}
/* Chat */
[data-theme="light"] .chat-bubble.assistant,[data-theme="light"] .chat-msg.assistant .chat-bubble{background:#fff;border-color:rgba(0,0,0,.1);color:#0F1130}
[data-theme="light"] .chat-input{background:#F5F6FC;border-color:rgba(0,0,0,.12);color:#0F1130}
[data-theme="light"] .chat-sug{background:#F0F2F8;border-color:rgba(0,0,0,.1);color:#5A5F80}
[data-theme="light"] .chat-sug:hover{border-color:#6C4FE8;color:#6C4FE8;background:rgba(108,79,232,.06)}
/* Transação typing */
[data-theme="light"] .chat-typing{background:#fff;border-color:rgba(0,0,0,.1)}
/* Cartões */
[data-theme="light"] .invp{background:#F5F6FC}
/* Sync */
[data-theme="light"] .syncbox{background:#FDFCFA;border-color:rgba(0,0,0,.08)}
/* Goals */
[data-theme="light"] .gcard{background:#F5F6FC;border-color:rgba(0,0,0,.08)}
[data-theme="light"] .gsi{background:#E8EAF4}
/* Reports */
[data-theme="light"] .rpanel{background:#FDFCFA;border-color:rgba(0,0,0,.08)}
[data-theme="light"] .hi:hover{background:#F0F2F8}
[data-theme="light"] .hi.sel{background:rgba(108,79,232,.06);border-color:rgba(108,79,232,.25)}
/* Bills */
[data-theme="light"] .bcard{background:#F5F6FC;border-color:rgba(0,0,0,.08)}
/* Cats */
[data-theme="light"] .ceitem{background:#F5F6FC;border-color:rgba(0,0,0,.08)}
/* Icon pickers */
[data-theme="light"] .ipk{background:#F0F2F8;border-color:rgba(0,0,0,.1)}
[data-theme="light"] .ipk.on{background:#6C4FE8;border-color:#6C4FE8}
/* Bottom nav mobile */
[data-theme="light"] .sidebar{border-top:1px solid rgba(0,0,0,.1)}
[data-theme="light"] .nav.on{border-top-color:#6C4FE8}
/* Tabs de transações */
[data-theme="light"] [style*="background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);overflow:hidden"]{background:#fff!important}
/* Vt/Vg/Vr cores no tema claro — mais contrastadas */
[data-theme="light"] .vg{color:#00875A}
[data-theme="light"] .vr{color:#D9304F}
[data-theme="light"] .vy{color:#1D4ED8}
[data-theme="light"] .vb{color:#2563EB}
[data-theme="light"] .va{color:#6C4FE8}
/* sb-foot */
[data-theme="light"] .sb-foot{border-top-color:rgba(0,0,0,.1)}
/* Loading */
[data-theme="light"] .chat-limit{border-color:rgba(184,120,0,.3);background:rgba(184,120,0,.08)}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:13px}
/* Safe area para iPhone com notch/Dynamic Island */
.main{padding-top:max(20px, env(safe-area-inset-top))}
.sidebar{padding-bottom:max(0px, env(safe-area-inset-bottom))}
input,select,button,textarea{font-family:inherit;font-size:13px}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
#root{height:100vh;display:flex;flex-direction:column}

/* AUTH */
#auth-screen{flex:1;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(123,97,255,.13) 0%,transparent 70%),var(--bg);padding:16px}
.auth-box{width:100%;max-width:360px;background:var(--bg2);border:1px solid var(--brd2);border-radius:18px;padding:32px 28px;margin:0 auto}
.logo{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--acc2),var(--grn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;text-align:center}
.logo-sub{color:var(--txt2);font-size:.78rem;text-align:center;margin-top:3px;margin-bottom:24px}
.tabs{display:flex;background:var(--bg3);border-radius:8px;padding:2px;gap:2px;margin-bottom:18px}
.tab{flex:1;padding:7px;border:none;background:transparent;color:var(--txt2);font-size:.78rem;font-weight:600;border-radius:6px;cursor:pointer;transition:all .15s}
.tab.on{background:var(--bg4);color:var(--txt)}
.fl{margin-bottom:11px}
.fl label{display:block;font-size:.68rem;font-weight:600;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.inp{width:100%;background:var(--bg3);border:1px solid var(--brd);color:var(--txt);border-radius:10px;padding:10px 13px;outline:none;transition:all .15s}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(139,92,246,.18)}
.inp::placeholder{color:var(--txt2);opacity:.5}
.inp option{background:var(--bg2)}
.btn-main{width:100%;padding:11px;background:linear-gradient(135deg,var(--acc),#5B41CF);color:#fff;border:none;border-radius:7px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:4px}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 7px 20px rgba(123,97,255,.4)}
.err{background:rgba(255,75,107,.1);border:1px solid rgba(255,75,107,.25);color:var(--red);border-radius:6px;padding:8px 11px;font-size:.78rem;margin-bottom:11px;text-align:center}
.demo-hint{text-align:center;font-size:.68rem;color:var(--txt2);margin-top:8px;opacity:.7}

/* APP LAYOUT */
#app-screen{flex:1;display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100%;overflow:hidden}
.sidebar{width:180px;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;padding:14px 10px;flex-shrink:0;overflow-y:auto}
.sb-logo{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--acc2),var(--grn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;padding:0 6px;margin-bottom:4px}
.sb-plan{display:inline-block;font-size:.58rem;font-weight:700;padding:1px 6px;background:rgba(123,97,255,.2);color:var(--acc2);border-radius:20px;text-transform:uppercase;margin:0 0 18px 6px}
.sb-sec{font-size:.58rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;padding:0 6px;margin:12px 0 5px}
.nav{display:flex;align-items:center;gap:7px;padding:8px 6px;border-radius:7px;cursor:pointer;color:var(--txt2);font-size:.82rem;margin-bottom:1px;transition:all .12s;user-select:none}
.nav:hover{background:var(--bg3);color:var(--txt)}
.nav.on{background:rgba(139,92,246,.18);color:var(--acc2);font-weight:700;border-radius:10px}
.nav-ic{width:16px;text-align:center;font-size:.85rem;flex-shrink:0}
.nav-label{font-size:.82rem}
.nav-badge{margin-left:auto;font-size:.58rem;background:rgba(255,75,107,.2);color:var(--red);padding:1px 5px;border-radius:8px;font-weight:700}
.sb-foot{border-top:1px solid var(--brd);padding:10px 6px 0;margin-top:auto;display:flex;align-items:center;gap:7px}
.av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--grn));display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0}
.un{flex:1;min-width:0}
.un-name{font-size:.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.un-email{font-size:.62rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-logout{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:.85rem;padding:3px;border-radius:4px;transition:color .12s}
.btn-logout:hover{color:var(--red)}
.main{flex:1;overflow-y:auto;padding:20px 22px;position:relative;box-sizing:border-box}
.ph{margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px}
.ph h1{font-size:1.3rem;font-weight:800;letter-spacing:-.5px;color:var(--txt)}
.ph .sub{color:var(--txt2);font-size:.78rem;margin-top:2px}
.btn-add{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;background:linear-gradient(135deg,var(--acc),#6D28D9);color:#fff;border:none;border-radius:12px;font-size:.76rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;box-shadow:0 4px 14px rgba(139,92,246,.4)}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(123,97,255,.4)}
.btn-s{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:var(--bg3);border:1px solid var(--brd);color:var(--txt2);border-radius:6px;font-size:.74rem;cursor:pointer;transition:all .12s}
.btn-s:hover{color:var(--txt);border-color:var(--brd2)}
.btn-g{background:rgba(0,229,160,.1);border-color:rgba(0,229,160,.25);color:var(--grn)}
.btn-d{background:rgba(255,75,107,.1);border-color:rgba(255,75,107,.25);color:var(--red)}

/* CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:14px}
.sc{background:var(--bg2);border:1px solid var(--brd);border-radius:18px;padding:14px 16px;position:relative;overflow:hidden;transition:transform .15s,border-color .15s;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.sc:hover{transform:translateY(-2px);border-color:var(--brd2)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0}
.cp::before{background:linear-gradient(90deg,var(--acc),var(--acc2))}.cg::before{background:var(--grn)}.cr::before{background:var(--red)}.cy::before{background:var(--ylw)}.cb::before{background:var(--blu)}
.sc-lbl{font-size:.65rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.sc-val{font-size:1.2rem;font-weight:800;letter-spacing:-.5px;margin-bottom:3px}
.sc-sub{font-size:.66rem;color:var(--txt2)}
.vg{color:var(--grn)}.vr{color:var(--red)}.vy{color:#1D4ED8}.vb{color:var(--blu)}.va{color:var(--acc2)}.vt{color:var(--txt)}
.panel{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad2);padding:17px;margin-bottom:13px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
/* ── DASHBOARD MODERNO ── */
.hero-card{background:linear-gradient(135deg,#1a0533 0%,#0f172a 40%,#042f2e 100%);border:1px solid rgba(139,92,246,.3);border-radius:24px;padding:26px 22px 22px;margin-bottom:18px;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.hero-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(123,97,255,.15),transparent 70%);pointer-events:none}
.hero-card::after{content:'';position:absolute;bottom:-30px;left:-20px;width:120px;height:120px;background:radial-gradient(circle,rgba(0,229,160,.1),transparent 70%);pointer-events:none}
.hero-label{font-size:.68rem;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.hero-amount{font-size:2.4rem;font-weight:800;color:#fff;letter-spacing:-1.5px;line-height:1;margin-bottom:4px}
.hero-sub{font-size:.75rem;color:rgba(255,255,255,.4);margin-bottom:20px}
.hero-row{display:flex;gap:12px}
.hero-pill{flex:1;background:rgba(255,255,255,.07);border-radius:12px;padding:10px 12px;backdrop-filter:blur(10px)}
.hero-pill-lbl{font-size:.6rem;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.hero-pill-val{font-size:.92rem;font-weight:700;letter-spacing:-.3px}
.mini-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.mini-card{background:var(--bg2);border:1px solid var(--brd);border-radius:18px;padding:15px 16px;position:relative;overflow:hidden;transition:transform .15s;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.mini-card:active{transform:scale(.98)}
.mini-card-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:10px}
.mini-card-lbl{font-size:.62rem;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.mini-card-val{font-size:1.05rem;font-weight:800;letter-spacing:-.4px}
.mini-card-sub{font-size:.62rem;color:var(--txt2);margin-top:3px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:.9rem;font-weight:700;color:var(--txt)}
.section-link{font-size:.72rem;color:var(--acc2);cursor:pointer;font-weight:600}
.tx-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.tx-item:last-child{border-bottom:none}
.tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:.82rem;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-cat{font-size:.66rem;color:var(--txt2);margin-top:2px}
.tx-val{font-size:.88rem;font-weight:700;flex-shrink:0}
.progress-ring{transform:rotate(-90deg)}
.chart-modern{background:var(--bg2);border:1px solid var(--brd);border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.pt{font-size:.85rem;font-weight:700;color:var(--txt);margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.two{display:grid;grid-template-columns:1fr 240px;gap:12px;margin-bottom:13px}

/* TRANSACTIONS */
.frow{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.fsearch{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--brd);color:var(--txt);border-radius:6px;padding:7px 10px;outline:none;font-size:.84rem}
.fsearch:focus{border-color:var(--acc)}
.fsearch::placeholder{color:var(--txt2);opacity:.5}
.fsel{background:var(--bg2);border:1px solid var(--brd);color:var(--txt);border-radius:6px;padding:7px 10px;outline:none;cursor:pointer}
.fsel option{background:var(--bg2)}
.ttable{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);overflow:hidden}
.thead{display:grid;grid-template-columns:1fr 90px 75px 82px 86px 50px;gap:6px;padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--brd)}
.th{font-size:.63rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px}
.trow{display:grid;grid-template-columns:1fr 90px 75px 82px 86px 50px;gap:6px;padding:10px 14px;border-bottom:1px solid var(--brd);align-items:center;transition:background .12s}
.trow:last-child{border-bottom:none}
.trow:hover{background:var(--bg3)}
.td-d{font-size:.82rem;color:var(--txt)}
.td-c{font-size:.72rem;color:var(--txt2)}
.td-dt{font-size:.74rem;color:var(--txt2)}
.td-v{font-size:.86rem;font-weight:700}
.td-v.income{color:var(--grn)}.td-v.expense{color:var(--red)}
.td-acts{display:flex;gap:3px}
.act-btn{background:none;border:none;color:var(--txt2);cursor:pointer;padding:4px 6px;border-radius:6px;font-size:.82rem;transition:all .12s;opacity:.7}
.act-btn:hover{opacity:1}
.act-btn.edit:hover{background:rgba(123,97,255,.15);color:var(--acc2)!important;opacity:1}
.act-btn.del:hover{background:rgba(255,75,107,.15);color:var(--red)!important;opacity:1}
.empty{text-align:center;padding:36px 20px;color:var(--txt2)}
.empty-ic{font-size:2.2rem;margin-bottom:8px}
.empty-t{font-size:.9rem;color:var(--txt);margin-bottom:3px;font-weight:600}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:var(--bg2);border:1px solid var(--brd2);border-radius:24px;width:100%;max-width:440px;padding:24px;max-height:92vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mh h2{font-size:1rem;font-weight:800;color:var(--txt)}
.mclose{background:var(--bg3);border:none;color:var(--txt2);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:.85rem;transition:all .12s}
.mclose:hover{background:rgba(255,75,107,.15);color:var(--red)}
.ttog{display:flex;background:var(--bg3);border-radius:8px;padding:2px;gap:2px;margin-bottom:13px}
.tbtn{flex:1;padding:8px;border:none;background:transparent;color:var(--txt2);font-size:.78rem;font-weight:600;border-radius:6px;cursor:pointer;transition:all .15s}
.tbtn.income.on{background:rgba(0,229,160,.15);color:var(--grn)}
.tbtn.expense.on{background:rgba(255,75,107,.15);color:var(--red)}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.macts{display:flex;gap:8px;margin-top:15px}
.btn-cancel{flex:1;padding:10px;background:var(--bg3);border:1px solid var(--brd);color:var(--txt2);border-radius:7px;cursor:pointer;transition:all .12s}
.btn-cancel:hover{color:var(--txt)}
.btn-save{flex:2;padding:10px;background:linear-gradient(135deg,var(--acc),#5B41CF);color:#fff;border:none;border-radius:7px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-save:hover{transform:translateY(-1px)}

/* CHARTS */
.bars{width:100%;overflow:hidden}
.bl{font-size:.58rem;color:var(--txt2)}
.bleg{display:flex;gap:12px;margin-top:6px;justify-content:flex-end}
.bli{display:flex;align-items:center;gap:4px;font-size:.65rem;color:var(--txt2)}
.bld{width:6px;height:6px;border-radius:50%}

/* CAT LIST */
.catlist{display:flex;flex-direction:column;gap:8px}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.cname{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--txt)}
.cval{font-size:.74rem;color:var(--txt2)}
.cbg{background:var(--bg3);border-radius:3px;height:4px;overflow:hidden}
.cfill{height:100%;border-radius:3px}

/* INSIGHTS */
.icard{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:9px;border:1px solid transparent;margin-bottom:7px}
.icard.danger{background:rgba(255,75,107,.07);border-color:rgba(255,75,107,.2)}
.icard.warning{background:rgba(255,184,48,.07);border-color:rgba(255,184,48,.2)}
.icard.success{background:rgba(0,229,160,.07);border-color:rgba(0,229,160,.2)}
.icard.info{background:rgba(75,139,255,.07);border-color:rgba(75,139,255,.2)}
.iic{font-size:1rem;flex-shrink:0;margin-top:1px}
.it{font-size:.8rem;font-weight:600;color:var(--txt);margin-bottom:2px}
.im{font-size:.73rem;color:var(--txt2);line-height:1.4}

/* CREDIT CARDS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:14px}
.ccard{border-radius:11px;padding:15px 17px;color:#fff;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s;min-height:96px;margin-bottom:8px}
.ccard:hover{transform:scale(1.02)}
.cc-chip{width:24px;height:18px;background:rgba(255,255,255,.25);border-radius:3px;margin-bottom:10px;font-size:.58rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.cc-name{font-size:.92rem;font-weight:700;margin-bottom:2px}
.cc-info{font-size:.6rem;opacity:.8}
.cc-lim{position:absolute;top:12px;right:13px;text-align:right}
.cc-lim-l{font-size:.56rem;opacity:.7;text-transform:uppercase}
.cc-lim-v{font-size:.82rem;font-weight:700}
.cc-due{position:absolute;bottom:12px;right:13px;text-align:right;font-size:.6rem;opacity:.8}
.invp{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-top:8px}
.invrow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--brd);font-size:.74rem}
.invrow:last-child{border-bottom:none;font-weight:700;font-size:.78rem}
.invlbl{color:var(--txt2)}
.hpill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:.63rem;font-weight:700}
.hps{background:rgba(0,229,160,.15);color:var(--grn)}.hpw{background:rgba(255,184,48,.15);color:var(--ylw)}.hpd{background:rgba(255,75,107,.15);color:var(--red)}

/* GOALS */
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px}
.gcard{background:var(--bg3);border:1px solid var(--brd);border-radius:11px;padding:13px 14px;transition:border-color .15s;min-width:0}
.gcard:hover{border-color:var(--brd2)}
.gh{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.gi{font-size:1.2rem;flex-shrink:0}
.gn{font-size:.84rem;font-weight:700;color:var(--txt);word-break:break-word}
.gdl{font-size:.63rem;color:var(--txt2);margin-top:2px}
.gpbg{background:var(--bg4);border-radius:5px;height:6px;overflow:hidden;margin-bottom:8px}
.gpfill{height:100%;border-radius:5px}
/* FIX: goal stats 3 cols sem overflow */
.gstats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;margin-bottom:8px}
.gsi{background:var(--bg4);border-radius:6px;padding:6px 5px;text-align:center;min-width:0;overflow:hidden}
.gsl{font-size:.58rem;color:var(--txt2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gsv{font-size:.72rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.gacts{display:flex;gap:4px}

/* BILLS */
.bcard{display:flex;align-items:center;gap:9px;background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:10px 12px;margin-bottom:7px;transition:border-color .15s}
.bcard:hover{border-color:var(--brd2)}
.bic{font-size:1.05rem;width:28px;height:28px;background:var(--bg4);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bi2{flex:1;min-width:0}
.bn{font-size:.8rem;font-weight:600;color:var(--txt)}
.bm{font-size:.67rem;color:var(--txt2);margin-top:1px}
.bv{font-size:.82rem;font-weight:700;white-space:nowrap;margin-right:6px}
.tog{width:32px;height:18px;border-radius:9px;border:none;cursor:pointer;position:relative;transition:background .15s;flex-shrink:0}
.tog.on{background:var(--grn)}.tog.off{background:var(--bg4);border:1px solid var(--brd2)}
.tog::after{content:'';position:absolute;top:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .15s}
.tog.on::after{left:17px}.tog.off::after{left:2px}

/* REPORTS */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.rpanel{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);padding:13px}
.rpanel.full{grid-column:1/-1}
.mnav{display:flex;align-items:center;gap:8px}
.mb{background:var(--bg3);border:1px solid var(--brd);color:var(--txt2);width:26px;height:26px;border-radius:6px;font-size:.9rem;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;justify-content:center}
.mb:hover{background:var(--bg4);color:var(--txt)}
.ml{font-size:.84rem;font-weight:700;min-width:116px;text-align:center;color:var(--txt)}
.ri{display:flex;align-items:center;gap:8px;padding:7px 9px;background:var(--bg3);border-radius:7px;margin-bottom:5px}
.rpos{font-size:.65rem;font-weight:800;color:var(--txt2);width:13px}
.rinf{flex:1;min-width:0}
.rn{font-size:.76rem;font-weight:500;color:var(--txt)}
.rbg{background:var(--bg4);border-radius:2px;height:3px;overflow:hidden;margin-top:3px}
.rfill{height:100%;border-radius:2px}
.rv{font-size:.74rem;font-weight:700;white-space:nowrap}
.sbar{height:20px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:10px}
.hi{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;border:1px solid transparent;cursor:pointer;margin-bottom:3px;transition:background .12s}
.hi:hover{background:var(--bg3)}.hi.worst{border-color:rgba(255,75,107,.25);background:rgba(255,75,107,.05)}.hi.best{border-color:rgba(0,229,160,.25);background:rgba(0,229,160,.05)}.hi.sel{border-color:rgba(123,97,255,.3);background:rgba(123,97,255,.08)}
.hm{font-size:.73rem;font-weight:600;color:var(--txt2);min-width:55px}
.hb{display:block;font-size:.57rem;margin-top:1px}
.hbars{flex:1;display:flex;flex-direction:column;gap:2px}
.hbrow{display:flex;align-items:center;gap:4px}
.hbbg{flex:1;background:var(--bg4);border-radius:2px;height:4px;overflow:hidden}
.hbf{height:100%;border-radius:2px}
.hbv{font-size:.64rem;font-weight:600;min-width:54px;text-align:right;white-space:nowrap}
.hbal{font-size:.7rem;font-weight:700;min-width:54px;text-align:right}
.smets{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.smi{background:var(--bg3);border-radius:7px;padding:9px 10px;text-align:center}
.sml{font-size:.6rem;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.smv{font-size:.84rem;font-weight:800}
.alrt{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:8px;margin-bottom:7px}
.alrt.danger{background:rgba(255,75,107,.08);border:1px solid rgba(255,75,107,.2)}.alrt.warning{background:rgba(255,184,48,.08);border:1px solid rgba(255,184,48,.2)}.alrt.success{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2)}
.aic{font-size:.95rem;flex-shrink:0}.ab{font-size:.74rem;color:var(--txt2);line-height:1.4}.ab strong{color:var(--txt);display:block;font-size:.76rem}

/* CATS PAGE */
.ceitem{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:8px;padding:8px 11px;border:1px solid var(--brd);margin-bottom:6px}
.cedot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ICON/COLOR PICKERS */
.ipicker{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}

async function apiAuth(action,email,pw,name){
  try{
    if(action==="login"){
      // Usa RPC via POST para evitar problemas com chars especiais na URL
      const r=await sbFetch('/rest/v1/rpc/g0_login',{
        method:'POST',
        body:JSON.stringify({p_email:email.trim(),p_pw:pw})
      });
      if(!r.ok){
        // HTTP error — tentar fallback
        throw new Error('HTTP '+r.status);
      }
      const result=await r.json();
      // RPC pode retornar o objeto direto ou dentro de um array
      const data=Array.isArray(result)?result[0]:result;
      if(!data||data.error)return{error:data&&data.error?data.error:"Email ou senha incorretos."};
      if(!data.uid)return{error:"Email ou senha incorretos."};
      return{user:{id:data.uid,name:data.uname,email:data.uemail}};
    }else{
      if(!name||!email||!pw)return{error:"Preencha todos os campos."};
      if(pw.length<6)return{error:"Senha: mínimo 6 caracteres."};
      // Verifica se email existe
      const chk=await sbFetch('/rest/v1/g0_users?email=eq.'+encodeURIComponent(email)+'&select=id');
      const existing=await chk.json();
      if(existing&&existing.length>0)return{error:"Email já cadastrado."};
      const id=Date.now().toString();
      const ins=await sbFetch('/rest/v1/g0_users',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({id,name,email,pw})});
      const rows=await ins.json();
      if(rows.code||rows.error)return{error:rows.message||"Erro ao criar conta."};
      const u=rows[0]||{id,name,email};
      return{user:{id:u.id,name:u.name,email:u.email}};
    }
  }catch(e){
    // Fallback localStorage se offline
    const users=LS.g("g0_users")||[{id:"demo",name:"João Silva",email:"joao@gasto0.com",pw:"123456"}];
    if(action==="login"){
      const found=users.find(u=>u.email===email&&u.pw===pw);
      if(!found)return{error:"Email ou senha incorretos."};
      const{pw:_,...safe}=found;return{user:safe};
    }else{
      if(!name||!email||!pw)return{error:"Preencha todos os campos."};
      if(pw.length<6)return{error:"Senha: mínimo 6 caracteres."};
      if(users.find(u=>u.email===email))return{error:"Email já cadastrado."};
      const nu={id:Date.now().toString(),name,email,pw};
      LS.s("g0_users",[...users,nu]);
      const{pw:_,...safe}=nu;return{user:safe};
    }
  }
}

async function apiResetPw(email, newPw){

      body:JSON.stringify({p_email:email.trim(), p_new_pw:newPw})

// Hash SHA-256 da senha — nunca enviamos senha em texto puro
async function hashPw(pw){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

  window.doReset=async function(){

    const btn=document.querySelector('.btn-main');
    if(btn){btn.textContent='Aguarde...';btn.disabled=true;}
    const pw1Hash = await hashPw(pw1);
    const res=await apiResetPw(email,pw1Hash);

      if(btn){btn.textContent='Redefinir senha';btn.disabled=false;}
      return;

  window.doAuth=async()=>{

    const name=mode==="register"?((document.getElementById("an")||{}).value.trim()||""):"";

    const passHash = await hashPw(pass);

    if(res.error){
      setErr(res.error);
      if(btn){btn.textContent=mode==="login"?"Entrar na conta":"Criar conta grátis";btn.disabled=false;}

    LS.s("g0_session",{uid:res.user.id});
    LS.s("g0_user_"+res.user.id, res.user);
    el.style.display="none";
    await doLogin(res.user);
  };

}

async function doLogin(u){
  U={id:u.id,name:u.name,email:u.email};
  LS.s("g0_user_"+u.id,{id:u.id,name:u.name,email:u.email});

  // Mostrar loading
  const authEl=document.getElementById("auth-screen");
  authEl.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:14px">'
    +'<div style="font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#9B85FF,#00E5A0);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Gasto0</div>'
    +'<div style="color:#8888A8;font-size:.84rem">Carregando seus dados...</div>'
    +'</div>';

  // Carregar dados com timeout — se demorar mais de 8s usa localStorage
  try{
    const loadPromise = apiLoad(u.id);
    const timeoutPromise = new Promise(function(resolve){
      setTimeout(function(){ resolve(null); }, 8000);
    });
    const result = await Promise.race([loadPromise, timeoutPromise]);
    D = result || getUD(u.id);
  }catch(e){
    D = getUD(u.id);
  }

  // Garantir categorias
  if(!D.categories||!D.categories.length) D.categories=CATS.map(c=>({...c}));

  renderApp();
}

function genIns(){
  const txs=D.transactions||[],cats=D.categories||CATS;
  const now=new Date(),cm=now.getMonth(),cy=now.getFullYear(),lm=cm===0?11:cm-1,ly=cm===0?cy-1:cy;
  const cur=txs.filter(t=>{const d=new Date(t.date);return d.getMonth()===cm&&d.getFullYear()===cy;});
  const lst=txs.filter(t=>{const d=new Date(t.date);return d.getMonth()===lm&&d.getFullYear()===ly;});
  const sum=(a,tp)=>a.filter(t=>t.type===tp).reduce((s,t)=>s+t.value,0);
  const ci=sum(cur,"income"),ce=sum(cur,"expense"),le=sum(lst,"expense");
  const ins=[];
  if(ce>ci&&ci>0)ins.push({type:"danger",icon:"🚨",title:"Gastos acima da renda",msg:`Gastou ${fmt(ce-ci)} a mais do que recebeu.`,p:1});
  if(le>0){const v=((ce-le)/le)*100;if(v>20)ins.push({type:"warning",icon:"📈",title:"Gastos em alta",msg:`Despesas subiram ${v.toFixed(0)}% vs mês passado.`,p:2});else if(v<-10)ins.push({type:"success",icon:"🎉",title:"Ótimo controle!",msg:`Reduziu ${Math.abs(v).toFixed(0)}% vs mês anterior.`,p:4});}
  const cS={};cats.forEach(c=>{cS[c.id]=cur.filter(t=>t.type==="expense"&&t.category===c.id).reduce((s,t)=>s+t.value,0);});
  const top=cats.reduce((t,c)=>(cS[c.id]||0)>(cS[t?.id]||0)?c:t,cats[0]);
  if(top&&cS[top.id]>0&&ce>0)ins.push({type:"info",icon:top.icon,title:`Principal: ${top.label}`,msg:`${top.label} = ${((cS[top.id]/ce)*100).toFixed(0)}% dos gastos (${fmt(cS[top.id])}).`,p:6});
  if(ci>0&&ce<ci*0.8)ins.push({type:"success",icon:"💚",title:"Finanças saudáveis",msg:`Economizando ${(100-ce/ci*100).toFixed(0)}% da renda!`,p:5});
  return ins.sort((a,b)=>a.p-b.p);
}

            const col=n.includes("luan")?"#F59E0B":n.includes("mari")?"#8B5CF6":["#3B82F6","#10B981","#F43F5E","#06B6D4","#EC4899"][i%5];

      <div class="section-link" onclick="goPage('transactions')">Ver todas →</div>

// ── TRANSACTIONS ─────────────────────────────────────────────
function pgTransactions(){
  const cats=D.categories||CATS;
  const all=D.transactions||[];

  // Totais por tipo (para as abas)
  const tInc=all.filter(t=>t.type==="income").reduce((a,t)=>a+t.value,0);
  const tExp=all.filter(t=>t.type==="expense").reduce((a,t)=>a+t.value,0);
  const nAll=all.length;
  const nInc=all.filter(t=>t.type==="income").length;
  const nExp=all.filter(t=>t.type==="expense").length;
  const nPaid=all.filter(t=>t.paid).length;
  const nUnpaid=all.filter(t=>!t.paid).length;

  const txs=all.filter(t=>{
    if(FT!=="all"&&t.type!==FT)return false;
    if(FC!=="all"&&t.category!==FC)return false;
    if(FP==="paid"&&!t.paid)return false;
    if(FP==="unpaid"&&t.paid)return false;
    if(FM!=="all"){const d=new Date(t.date);const key=d.getFullYear()+"-"+d.getMonth();if(key!==FM)return false;}
    if(FPAY!=="all"){
      const pm=t.paymentMethod||"";
      if(FPAY==="pix"&&pm!=="pix")return false;
      if(FPAY==="debit"&&pm!=="debit")return false;
      if(FPAY==="credit"&&(pm!=="credit"||!t.cardId))return false;
      if(FPAY==="cash"&&pm!=="cash")return false;
    }
    if(FS){const q=FS.toLowerCase(),c=getCat(t.category);return(t.description||"").toLowerCase().includes(q)||(c.label||"").toLowerCase().includes(q);}
    return true;
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));

  // Subtotais da lista filtrada
  const filtInc=txs.filter(t=>t.type==="income").reduce((a,t)=>a+t.value,0);
  const filtExp=txs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.value,0);

  // Meses disponíveis para o filtro
  const txMonths=[];
  const seenM=new Set();
  all.forEach(t=>{
    const d=new Date(t.date);
    const key=d.getFullYear()+"-"+d.getMonth();
    if(!seenM.has(key)){
      seenM.add(key);
      txMonths.push({key,y:d.getFullYear(),m:d.getMonth(),
        lbl:new Date(d.getFullYear(),d.getMonth(),1).toLocaleString("pt-BR",{month:"short",year:"2-digit"}).replace("."," ").replace(/^\w/,c=>c.toUpperCase())
      });
    }
  });
  txMonths.sort((a,b)=>b.y-a.y||b.m-a.m);

  return`
    <div class="ph">
      <div><h1>Transações</h1><div class="sub">${nAll} registros · <span style="color:var(--grn)">${nPaid} pagos</span> · <span style="color:#1D4ED8">${nUnpaid} pendentes</span></div></div>
      <div style="display:flex;gap:7px"><button class="btn-s btn-g" onclick="expCSV()">↓ CSV</button><button class="btn-add" onclick="openM('tx')">+ Nova</button></div>
    </div>

    <!-- Abas Todos / Receitas / Despesas -->
    <div style="display:flex;gap:0;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);overflow:hidden;margin-bottom:13px">
      <button onclick="FT='all';FC='all';FP='all';FS='';renderMain()"
        style="flex:1;padding:11px 8px;border:none;border-right:1px solid var(--brd);cursor:pointer;transition:all .15s;
               background:${FT==="all"?"var(--bg3)":"transparent"};
               border-bottom:${FT==="all"?"2px solid var(--acc)":"2px solid transparent"}">
        <div style="font-size:.72rem;font-weight:700;color:${FT==="all"?"var(--txt)":"var(--txt2)"}">Todas</div>
        <div style="font-size:.64rem;color:var(--txt2);margin-top:2px">${nAll} trans.</div>
      </button>
      <button onclick="FT='income';FC='all';FP='all';FS='';renderMain()"
        style="flex:1;padding:11px 8px;border:none;border-right:1px solid var(--brd);cursor:pointer;transition:all .15s;
               background:${FT==="income"?"var(--bg3)":"transparent"};
               border-bottom:${FT==="income"?"2px solid var(--grn)":"2px solid transparent"}">
        <div style="font-size:.72rem;font-weight:700;color:${FT==="income"?"var(--grn)":"var(--txt2)"}">↑ Receitas</div>
        <div style="font-size:.64rem;color:var(--grn);margin-top:2px">${fmt(tInc)}</div>
      </button>
      <button onclick="FT='expense';FC='all';FP='all';FS='';renderMain()"
        style="flex:1;padding:11px 8px;border:none;cursor:pointer;transition:all .15s;
               background:${FT==="expense"?"var(--bg3)":"transparent"};
               border-bottom:${FT==="expense"?"2px solid var(--red)":"2px solid transparent"}">
        <div style="font-size:.72rem;font-weight:700;color:${FT==="expense"?"var(--red)":"var(--txt2)"}">↓ Despesas</div>
        <div style="font-size:.64rem;color:var(--red);margin-top:2px">${fmt(tExp)}</div>
      </button>
    </div>

    <!-- Filtros secundários -->
    <div class="frow">
      <input class="fsearch inp" id="tx-search" placeholder="Buscar..." value="${FS}" oninput="FS=this.value;renderTxTable()"/>
      <select class="fsel inp" onchange="FM=this.value;renderMain()">
        <option value="all"${FM==="all"?" selected":""}>Todos os meses</option>
        ${txMonths.map(mo=>`<option value="${mo.key}"${FM===mo.key?" selected":""}>${mo.lbl}</option>`).join("")}
      </select>
      <select class="fsel inp" onchange="FC=this.value;renderMain()">
        <option value="all"${FC==="all"?" selected":""}>Todas cats</option>
        ${cats.map(c=>`<option value="${c.id}"${FC===c.id?" selected":""}>${c.icon} ${c.label}</option>`).join("")}
      </select>
      <select class="fsel inp" onchange="FP=this.value;renderMain()">
        <option value="all"${FP==="all"?" selected":""}>Todos status</option>
        <option value="paid"${FP==="paid"?" selected":""}>✅ Pagos</option>
        <option value="unpaid"${FP==="unpaid"?" selected":""}>⏳ Pendentes</option>
      </select>
      <select class="fsel inp" onchange="FPAY=this.value;renderMain()">
        <option value="all"${FPAY==="all"?" selected":""}>Todos pagamentos</option>
        <option value="pix"${FPAY==="pix"?" selected":""}>💠 PIX</option>
        <option value="debit"${FPAY==="debit"?" selected":""}>💳 Débito</option>
        <option value="credit"${FPAY==="credit"?" selected":""}>💳 Crédito</option>
        <option value="cash"${FPAY==="cash"?" selected":""}>💵 Dinheiro</option>
      </select>
    </div>

    <!-- Resumo do filtro atual -->
    ${txs.length>0?`<div style="display:flex;gap:12px;margin-bottom:10px;font-size:.74rem;color:var(--txt2)">
      <span>${txs.length} ${txs.length===1?"resultado":"resultados"}</span>
      ${filtInc>0?`<span style="color:var(--grn)">↑ ${fmt(filtInc)}</span>`:""}
      ${filtExp>0?`<span style="color:var(--red)">↓ ${fmt(filtExp)}</span>`:""}
      ${filtInc>0&&filtExp>0?`<span style="color:${filtInc-filtExp>=0?"var(--grn)":"var(--red)"}">= ${fmt(filtInc-filtExp)}</span>`:""}
    </div>`:""}

    <!-- Tabela -->
    <div class="ttable">
      <div class="thead"><div class="th">Descrição</div><div class="th">Categoria</div><div class="th">Data</div><div class="th">Valor</div><div class="th">Status</div><div class="th"></div></div>
      <div id="tx-table-body">${txs.length===0?`<div class="empty"><div class="empty-ic">${FT==="income"?"💰":FT==="expense"?"💸":"📋"}</div><div class="empty-t">${FT==="income"?"Nenhuma receita":FT==="expense"?"Nenhuma despesa":"Nenhuma transação"}</div></div>`:
      txs.map(t=>{
        const c=getCat(t.category);
        const card=t.cardId?(D.cards||[]).find(x=>x.id===t.cardId):null;
        const isPaid=t.paid===true||(t.paid===undefined&&t.type==="income");
        return`<div class="trow">
          <div><div class="td-d">${t.description||"—"}</div>${card?`<div style="font-size:.62rem;color:var(--acc2);margin-top:1px">💳 ${card.name}</div>`:""}</div>
          <div class="td-c">${c.icon} ${c.label}</div>
          <div class="td-dt">${fd(t.date)}</div>
          <div class="td-v ${t.type}">${t.type==="income"?"+":"-"}${fmt(t.value)}</div>
          <div>
            <button data-id="${t.id}" data-action="togPaid"
              style="padding:3px 9px;border-radius:20px;border:1px solid ${isPaid?"rgba(0,229,160,.4)":"rgba(255,184,48,.4)"};background:${isPaid?"rgba(0,229,160,.1)":"rgba(255,184,48,.1)"};color:${isPaid?"var(--grn)":"var(--ylw)"};font-size:.66rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s">
              ${isPaid?"✅ Pago":"⏳ Pendente"}
            </button>
          </div>
          <div class="td-acts">
            <button class="act-btn edit" data-id="${t.id}" data-action="editTx" title="Editar">✏️</button>
            <button class="act-btn del" data-id="${t.id}" data-action="delTx" title="Excluir">✕</button>
          </div>
        </div>`;
      }).join("")}</div>
    </div>`;
}

window.expCSV=()=>{const rows=(D.transactions||[]).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t=>{const c=getCat(t.category);return[fd(t.date),t.type==="income"?"Receita":"Despesa",c.label,t.description||"",t.value.toFixed(2)].join(";");});const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+"Data;Tipo;Categoria;Descrição;Valor\n"+rows.join("\n")],{type:"text/csv;charset=utf-8"}));a.download="gasto0.csv";a.click();};

// ── CARDS ── Fatura do mes atual ─────────────────────────────
function getInv(card){
  const now=new Date();
  const cm=now.getMonth(),cy=now.getFullYear();
  // Todas despesas deste cartao no mes atual
  const txs=(D.transactions||[]).filter(t=>{
    if(t.type!=="expense")return false;
    if(!t.cardId||String(t.cardId)!==String(card.id))return false;
    const d=new Date(t.date);
    return d.getMonth()===cm&&d.getFullYear()===cy;
  });
  const total=txs.reduce((a,t)=>a+t.value,0);
  const pct=card.limit>0?(total/card.limit)*100:0;
  let dueM=cm,dueY=cy;
  if(now.getDate()>card.closingDay){dueM++;if(dueM>11){dueM=0;dueY++;}}
  const due=new Date(dueY,dueM,card.dueDay).toLocaleDateString("pt-BR");
  return{total,pct,status:pct>90?"danger":pct>70?"warn":"safe",txs,due};
}

function getCardHistory(card){
  // Últimos 6 meses de gasto no cartão
  const now=new Date();
  const months=[];
  for(let i=5;i>=0;i--){
    let m=now.getMonth()-i, y=now.getFullYear();
    while(m<0){m+=12;y--;}
    const txs=(D.transactions||[]).filter(t=>{
      if(t.type!=="expense")return false;
      if(!t.cardId||String(t.cardId)!==String(card.id))return false;
      const d=new Date(t.date);
      return d.getMonth()===m&&d.getFullYear()===y;
    });
    const total=txs.reduce((a,t)=>a+t.value,0);
    const lbl=new Date(y,m,1).toLocaleString("pt-BR",{month:"short"}).replace(".","");
    months.push({m,y,lbl,total,count:txs.length});
  }
  return months;
}

function buildFinancialContext(){
  const txs=D.transactions||[],cats=D.categories||CATS,cards=D.cards||[],goals=D.goals||[],bills=D.bills||[];
  const now=new Date(),cm=now.getMonth(),cy=now.getFullYear();
  const curTx=txs.filter(t=>{const d=new Date(t.date);return d.getMonth()===cm&&d.getFullYear()===cy;});
  const ti=curTx.filter(t=>t.type==="income").reduce((a,t)=>a+t.value,0);
  const te=curTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.value,0);
  const bal=ti-te;
  const savRate=ti>0?((bal/ti)*100).toFixed(1):"0";
  const totalInc=txs.filter(t=>t.type==="income").reduce((a,t)=>a+t.value,0);
  const totalExp=txs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.value,0);
  const catS=cats.map(c=>({...c,total:curTx.filter(t=>t.type==="expense"&&t.category===c.id).reduce((a,t)=>a+t.value,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const last3=txs.filter(t=>{const d=new Date(t.date);const diff=(cy-d.getFullYear())*12+(cm-d.getMonth());return diff>=0&&diff<=2;});
  const hist12=Array.from({length:12},(_,i)=>{
    let m=cm-11+i,y=cy;while(m<0){m+=12;y--;}
    const mt=txs.filter(t=>{const d=new Date(t.date);return d.getMonth()===m&&d.getFullYear()===y;});
    const inc=mt.filter(t=>t.type==="income").reduce((a,t)=>a+t.value,0);
    const exp=mt.filter(t=>t.type==="expense").reduce((a,t)=>a+t.value,0);
    return MONTHS[m]+"/"+String(y).slice(2)+": Rec="+fmt(inc)+" Desp="+fmt(exp)+" Saldo="+fmt(inc-exp);
  });

  // Montar contexto como string concatenada (evita problemas de template aninhado)
  let ctx = "Você é o Assistente Financeiro Pessoal de "+U.name+". Você tem acesso COMPLETO e em TEMPO REAL a todos os dados financeiros dele(a). ";
  ctx += "Suas capacidades:\n";
  ctx += "1. REGISTRAR TRANSAÇÕES: Quando o usuário disser que gastou ou recebeu algo, extraia os dados e use a função saveTransaction para registrar. Peça confirmação antes. ";
  ctx += "Exemplo: 'Gastei 50 reais no mercado hoje' → identifique valor, categoria, data, forma de pagamento.\n";
  ctx += "2. ANÁLISE FINANCEIRA: Analise padrões, identifique onde gasta mais, compare meses, projete economias.\n";
  ctx += "3. ORIENTAÇÃO PRÁTICA: Dê dicas personalizadas baseadas nos dados reais. Sugira onde cortar, como economizar, quando pagar dívidas.\n";
  ctx += "4. RESUMOS: Faça resumos do mês atual, períodos específicos ou comparações.\n";
  ctx += "5. DIAGNÓSTICO: Avalie a saúde financeira com nota e pontos de melhoria.\n\n";
  ctx += "Tom: Fale como um amigo que entende muito de finanças. Seja direto, empático, nunca julgamental. ";
  ctx += "Celebre conquistas, encoraje nas dificuldades. Use os dados REAIS abaixo nas respostas.\n\n";
  ctx += "IMPORTANTE: Se o usuário mencionar um gasto/receita para registrar, responda em JSON no formato:\n";
  ctx += "{\"action\":\"register\",\"tx\":{\"type\":\"expense/income\",\"value\":0,\"description\":\"texto\",\"category\":\"id\",\"date\":\"YYYY-MM-DD\",\"paymentMethod\":\"pix/credit/debit/cash\"},\"message\":\"confirmação amigável\"}\n";
  ctx += "Para respostas normais (sem registro), responda normalmente em texto/markdown.\n\n";

  ctx += "=== VISÃO GERAL ("+MONTHS[cm]+" "+cy+") ===\n";
  ctx += "Receitas do mês: "+fmt(ti)+" ("+curTx.filter(t=>t.type==="income").length+" transações)\n";
  ctx += "Despesas do mês: "+fmt(te)+" ("+curTx.filter(t=>t.type==="expense").length+" transações)\n";
  ctx += "Saldo do mês: "+fmt(bal)+" ("+(bal>=0?"positivo":"negativo")+")\n";
  ctx += "Taxa de poupança: "+savRate+"%\n";
  ctx += "Total acumulado receitas: "+fmt(totalInc)+"\n";
  ctx += "Total acumulado despesas: "+fmt(totalExp)+"\n";
  ctx += "Patrimônio líquido acumulado: "+fmt(totalInc-totalExp)+"\n\n";

  ctx += "=== CARTÕES DE CRÉDITO ===\n";
  if(cards.length===0){
    ctx += "Nenhum cartão cadastrado\n";
  } else {
    cards.forEach(function(card){
      const now2=new Date();
      let im=now2.getMonth(),iy=now2.getFullYear();
      if(now2.getDate()>card.closingDay){im++;if(im>11){im=0;iy++;}}
      const ct=txs.filter(function(t){
        if(t.type!=="expense"||!t.cardId||String(t.cardId)!==String(card.id))return false;
        const d=new Date(t.date);
        return d.getMonth()===im&&d.getFullYear()===iy;
      });
      const tot=ct.reduce(function(a,t){return a+t.value;},0);
      const pct=card.limit>0?(tot/card.limit*100).toFixed(1):"0";
      ctx += "- "+card.name+": fatura "+fmt(tot)+" ("+pct+"% do limite de "+fmt(card.limit)+")\n";
    });
  }

  ctx += "\n=== TOP CATEGORIAS DO MÊS ===\n";
  if(catS.length===0){
    ctx += "Sem despesas registradas\n";
  } else {
    catS.slice(0,6).forEach(function(cat,i){
      const pct=te>0?((cat.total/te)*100).toFixed(1):"0";
      ctx += (i+1)+". "+cat.icon+" "+cat.label+": "+fmt(cat.total)+" ("+pct+"% das despesas)\n";
    });
  }

  ctx += "\n=== TRANSAÇÕES (ÚLTIMOS 3 MESES) ===\n";
  last3.slice(0,60).forEach(function(t){
    const cat=cats.find(function(c){return c.id===t.category;})||{icon:"📦",label:t.category};
    ctx += t.date+" | "+(t.type==="income"?"RECEITA":"DESPESA")+" | "+cat.label+" | "+fmt(t.value)+" | "+(t.description||"-")+"\n";
  });

  ctx += "\n=== METAS FINANCEIRAS ===\n";
  if(goals.length===0){
    ctx += "Nenhuma meta cadastrada\n";
  } else {
    goals.forEach(function(g){
      const pct=(g.saved/g.target*100).toFixed(1);
      ctx += "- "+g.name+": "+fmt(g.saved)+" de "+fmt(g.target)+" ("+pct+"%)";
      if(g.deadline){
        const dl=new Date(g.deadline);
        const mesesR=(dl.getFullYear()-now.getFullYear())*12+(dl.getMonth()-now.getMonth());
        if(mesesR>0){
          const ap=((g.target-g.saved)/mesesR);
          ctx += " | Prazo: "+g.deadline+" | Aporte mensal: "+fmt(ap);
        }
      }
      ctx += "\n";
    });
  }

  ctx += "\n=== CONTAS FIXAS ===\n";
  const ativas=bills.filter(function(b){return b.active;});
  if(ativas.length===0){
    ctx += "Nenhuma conta fixa ativa\n";
  } else {
    ativas.forEach(function(b){
      const pago=isBillPaidThisMonth(b)?"Paga":"Pendente";
      ctx += "- "+b.name+": "+fmt(b.value)+"/mês | Dia "+b.dueDay+" | "+pago+"\n";
    });
  }

  ctx += "\n=== HISTÓRICO MENSAL (12 MESES) ===\n";
  ctx += hist12.join("\n")+"\n";

  return ctx;
}

function buildSuggestions(){
  const txs = D.transactions||[], goals = D.goals||[], cards = D.cards||[];
  const now = new Date(), cm = now.getMonth(), cy = now.getFullYear();
  const curTx = txs.filter(t=>{const d=new Date(t.date);return d.getMonth()===cm&&d.getFullYear()===cy;});
  const ti = curTx.filter(t=>t.type==="income").reduce((a,t)=>a+t.value,0);
  const te = curTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.value,0);
  const savRate = ti>0?((ti-te)/ti*100):0;
  const sugs = [
    "Como estão minhas finanças este mês?",
    "Onde posso cortar gastos?",
    "Faça um diagnóstico completo",
  ];
  if(savRate < 10) sugs.push("Como aumentar minha poupança?");
  if(te > ti) sugs.push("Meu saldo está negativo, o que fazer?");
  const nearGoal = goals.find(g=>{if(!g.deadline)return false;const dl=new Date(g.deadline);const diff=Math.ceil((dl-now)/(864e5*30));return diff<=3&&diff>0;});
  if(nearGoal) sugs.push(`Vou bater minha meta de ${nearGoal.name}?`);
  const highCard = cards.find(card=>{const inv=(()=>{const now2=new Date();let im=now2.getMonth(),iy=now2.getFullYear();if(now2.getDate()>card.closingDay){im++;if(im>11){im=0;iy++;}}const ct=txs.filter(t=>{if(t.type!=="expense"||!t.cardId||String(t.cardId)!==String(card.id))return false;const d=new Date(t.date);return d.getMonth()===im&&d.getFullYear()===iy;});return ct.reduce((a,t)=>a+t.value,0)/card.limit*100;})();return inv>70;});
  if(highCard) sugs.push(`Fatura do ${highCard.name} está alta, o que fazer?`);
  sugs.push("Me dê um plano para economizar mais");
  return sugs.slice(0,5);
}

function renderMarkdown(text){
  return text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<strong style="font-size:.85rem;display:block;margin:6px 0 2px">$1</strong>')
    .replace(/^## (.+)$/gm,'<strong style="font-size:.88rem;display:block;margin:8px 0 3px">$1</strong>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>(\n|$))+/g,'<ul>$&</ul>')
    .replace(/\n/g,'<br>');
}

window.importarPDF = function(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.pdf,application/pdf,.txt,.csv';
  input.onchange = async function(e){
    const file = e.target.files[0];
    if(!file) return;
    const statusEl = document.getElementById('pdf-status');
    const previewEl = document.getElementById('pdf-preview');
    if(!statusEl) return;

    statusEl.innerHTML = '<div style="padding:10px;background:rgba(123,97,255,.08);border:1px solid rgba(123,97,255,.2);border-radius:7px;font-size:.78rem;color:var(--acc2)">⏳ Lendo o arquivo... aguarde.</div>';
    if(previewEl) previewEl.innerHTML = '';

    try{
      let textContent = '';

      // Tentar ler como texto (funciona para PDF digitais e TXT/CSV)
      const textResult = await new Promise(function(resolve, reject){
        const reader = new FileReader();
        reader.onload = function(ev){ resolve(ev.target.result); };
        reader.onerror = function(){ reject(new Error('Erro ao ler arquivo')); };
        reader.readAsText(file, 'utf-8');
      });

      // Filtrar caracteres legíveis (PDFs têm muito lixo binário)
      textContent = textResult
        .replace(/[^\x20-\x7E\xC0-\xFF\n\r\t]/g, ' ')  // manter ASCII + Latin
        .replace(/\s+/g, ' ')
        .trim();

      // Se muito lixo (menos de 20% legível), avisar
      const readableChars = (textResult.match(/[a-zA-Z0-9\.,\/\-\s]/g)||[]).length;
      const ratio = readableChars / textResult.length;

      if(ratio < 0.15 || textContent.length < 50){
        statusEl.innerHTML = '<div style="padding:10px;background:rgba(255,184,48,.08);border:1px solid rgba(255,184,48,.2);border-radius:7px;font-size:.78rem;color:var(--ylw)">⚠️ PDF protegido ou escaneado. Tente exportar o extrato como PDF digital no app do banco, ou cole o texto abaixo.</div>'
          + '<div style="margin-top:8px"><textarea id="pdf-text-manual" class="inp" style="width:100%;height:120px;font-size:.74rem;resize:vertical" placeholder="Cole aqui o texto do extrato bancário..."></textarea>'
          + '<button class="btn-add" style="margin-top:6px;font-size:.76rem" onclick="processarTextoPDF()">🤖 Analisar texto</button></div>';
        return;
      }

      statusEl.innerHTML = '<div style="padding:10px;background:rgba(123,97,255,.08);border:1px solid rgba(123,97,255,.2);border-radius:7px;font-size:.78rem;color:var(--acc2)">🤖 IA analisando... (' + textContent.length + ' caracteres)</div>';

      await analisarTextoBancario(textContent, statusEl, previewEl);

    }catch(err){
      statusEl.innerHTML = '<div style="padding:10px;background:rgba(255,75,107,.08);border:1px solid rgba(255,75,107,.2);border-radius:7px;font-size:.78rem;color:var(--red)">❌ Erro: ' + err.message + '</div>';
    }
  };
  input.click();
};

      <button class="btn-save" onclick="saveTx()">${isEdit?"Salvar alterações":"Salvar"}</button>
    </div>

window.saveTx=()=>{
  const v=parseFloat((document.getElementById("txv")||{}).value||0);
  if(!v||isNaN(v))return;
  const payEl=document.getElementById("txpayment");
  const parcEl=document.getElementById("txparc");
  const payVal=payEl?payEl.value:'pix';
  const cardId=payVal&&payVal.startsWith('card_')?payVal.replace('card_',''):null;
  const paymentMethod=cardId?'credit':payVal;
  const parcelas=cardId&&parcEl?parseInt(parcEl.value)||1:1;
  const baseDate=(document.getElementById("txd")||{}).value||tod();
  const desc=(document.getElementById("txdesc")||{}).value||"";
  const cat=(document.getElementById("txc")||{}).value||"others";

  const txs=D.transactions||[];

  if(MS.id){
    // Edição: atualiza só esta transação
    const tx={id:MS.id,type:MS.txType,value:v,category:cat,date:baseDate,description:desc,cardId:cardId,paymentMethod:paymentMethod,paid:MS.paid!==undefined?MS.paid:(MS.txType==="income"?true:paymentMethod!=="credit")};
    save({...D,transactions:txs.map(t=>t.id===MS.id?tx:t)});
  } else if(parcelas>1){
    // Parcelamento: cria uma transação por parcela
    const valorParc=parseFloat((v/parcelas).toFixed(2));
    const novas=[];
    const baseD=new Date(baseDate);
    for(let i=0;i<parcelas;i++){
      const d=new Date(baseD.getFullYear(),baseD.getMonth()+i,baseD.getDate());
      const mesStr=String(d.getMonth()+1).padStart(2,"0");
      const diaStr=String(d.getDate()).padStart(2,"0");
      novas.push({
        id:Date.now().toString()+"_"+i,
        type:MS.txType,
        value:valorParc,
        category:cat,
        date:d.getFullYear()+"-"+mesStr+"-"+diaStr,
        description:desc+" ("+(i+1)+"/"+parcelas+")",
        cardId:cardId,
        paid:false
      });
    }
    save({...D,transactions:[...txs,...novas]});
  } else {
    // Transação única
    const tx={id:Date.now().toString(),type:MS.txType,value:v,category:cat,date:baseDate,description:desc,cardId:cardId,paymentMethod:paymentMethod,paid:MS.paid!==undefined?MS.paid:(MS.txType==="income"?true:paymentMethod!=="credit")};
    save({...D,transactions:[...txs,tx]});
  }
  closeM();
};

// ── MODAL DE CONFIRMAÇÃO ─────────────────────────────────────
// Evita confirm() nativo que pode ser bloqueado pelo browser
function showConfirm(msg, onYes){
  const el=document.getElementById("modal-root");
  const div=document.createElement("div");
  div.className="overlay";
  div.innerHTML='<div class="modal" style="max-width:320px;text-align:center">'
    +'<div style="font-size:1.5rem;margin-bottom:10px">⚠️</div>'
    +'<div style="font-size:.9rem;color:var(--txt);margin-bottom:18px">'+msg+'</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn-cancel" style="flex:1" onclick="closeM()">Cancelar</button>'
    +'<button class="btn-save" style="flex:1;background:linear-gradient(135deg,var(--red),#c0392b)" id="confirm-yes">Confirmar</button>'
    +'</div></div>';
  el.innerHTML='';
  el.appendChild(div);
  document.getElementById("confirm-yes").onclick=function(){closeM();onYes();};
}

// ── EVENT DELEGATION ──────────────────────────────────────────
document.addEventListener('click',function(e){
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const id=btn.dataset.id;
  const action=btn.dataset.action;
  if(action==='delBill'){
    showConfirm("Remover esta conta fixa?",()=>save({...D,bills:(D.bills||[]).filter(b=>b.id!==id)}));
  }else if(action==='togBill'){
    save({...D,bills:(D.bills||[]).map(b=>b.id===id?{...b,active:!b.active}:b)});
  }else if(action==='editBill'){
    openM('editBill',id);
  }else if(action==='editTx'){
    openM('editTx',id);
  }else if(action==='delCard'){
    showConfirm("Remover este cartão?",()=>save({...D,cards:(D.cards||[]).filter(c=>c.id!==id)}));
  }else if(action==='delGoal'){
    showConfirm("Remover esta meta?",()=>save({...D,goals:(D.goals||[]).filter(g=>g.id!==id)}));
  }else if(action==='delCat'){
    showConfirm("Remover esta categoria?",()=>save({...D,categories:(D.categories||CATS).filter(c=>c.id!==id)}));
  }else if(action==='delTx'){
    showConfirm("Excluir esta transação?",()=>save({...D,transactions:(D.transactions||[]).filter(t=>t.id!==id)}));
  }else if(action==='togPaid'){
    save({...D,transactions:(D.transactions||[]).map(t=>t.id===id?{...t,paid:!(t.paid===true||(t.paid===undefined&&t.type==="income"))}:t)});
  }
});

<script>
// Banner de instalação PWA (Android)
let deferredPrompt;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('install-btn');
  if(btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', function(){
  deferredPrompt = null;
  const btn = document.getElementById('install-btn');
  if(btn) btn.style.display = 'none';
});
window.installPWA = function(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){ deferredPrompt = null; });
  }
};
</script>
